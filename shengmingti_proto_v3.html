<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>声·命体 —— v3.0</title>
  <!-- Three.js 库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- GSAP 动画库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; overflow: hidden; }
    #visual-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    #menu-btn { position: fixed; bottom: 20px; left: 20px; width: 44px; height: 44px; background: rgba(10,10,10,0.9); border: 1px solid #444; border-radius: 8px; cursor: pointer; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
    #menu-btn span { display: block; width: 18px; height: 1.5px; background: #888; }
    #side-menu { position: fixed; bottom: 70px; left: 20px; width: 280px; background: rgba(8,8,8,0.98); border: 1px solid #333; border-radius: 12px; padding: 16px; z-index: 199; display: none; }
    #side-menu.open { display: block; }
    .section-title { font-size: 9px; letter-spacing: 2px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
    .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .slider-row label { font-size: 10px; color: #888; min-width: 70px; }
    .slider-row input[type="range"] { flex: 1; height: 4px; background: #333; border-radius: 2px; -webkit-appearance: none; }
    .slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; }
    .slider-row .value { font-size: 10px; color: #fff; min-width: 50px; text-align: right; font-family: monospace; }
    #chapter-panel { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 8px; z-index: 100; }
    .chapter-btn { padding: 10px 16px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid #444; background: transparent; color: #666; cursor: pointer; border-radius: 6px; }
    .chapter-btn.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
    .chapter-btn.locked { border-color: #333; color: #333; cursor: not-allowed; opacity: 0.5; }
    #reset-btn { padding: 10px 12px; font-size: 9px; border: 1px solid #333; background: transparent; color: #444; cursor: pointer; border-radius: 6px; }
    #conn-panel { position: fixed; bottom: 80px; right: 20px; background: rgba(10,10,10,0.95); border: 1px solid #333; border-radius: 12px; padding: 14px 18px; z-index: 100; min-width: 220px; }
    .panel-header { font-size: 10px; letter-spacing: 3px; color: #666; text-transform: uppercase; text-align: center; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 12px; }
    .conn-btn { width: 100%; padding: 10px; font-size: 9px; letter-spacing: 2px; border: 1px solid #444; background: transparent; color: #666; cursor: pointer; border-radius: 4px; margin-bottom: 8px; }
    .conn-btn.connected { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
    .energy-bar { display: flex; align-items: center; gap: 8px; font-size: 9px; color: #666; margin-top: 8px; }
    .energy-track { flex: 1; height: 3px; background: #222; border-radius: 2px; overflow: hidden; }
    .energy-fill { height: 100%; background: #fff; width: 0%; }
    #phase-indicator { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.5); z-index: 50; text-transform: uppercase; }
    
    /* 文字覆盖层 */
    .text-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 300;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .text-overlay.hidden { opacity: 0; }
    
    /* 开场 Intro */
    #intro-overlay {
      background: #000;
    }
    .intro-main {
      font-family: 'Songti SC', 'SimSun', 'STSong', serif;
      font-size: 72px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 20px;
      text-indent: 20px;
      margin-bottom: 20px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1.2s ease;
    }
    .intro-main.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .intro-sub {
      display: flex; align-items: center; gap: 20px;
      font-size: 12px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.6);
      opacity: 0;
      transition: opacity 0.8s ease 0.5s;
    }
    .intro-sub.visible { opacity: 1; }
    .intro-line {
      width: 40px; height: 1px;
      background: rgba(255,255,255,0.3);
    }
    
    /* 文案序列 */
    #narrative-overlay {
      background: transparent;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #narrative-overlay.visible { opacity: 1; }
    .narrative-cn {
      font-family: 'Songti SC', 'SimSun', 'STSong', serif;
      font-size: 28px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 16px;
      max-width: 80%;
      line-height: 1.6;
    }
    .narrative-en {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
    }
    .narrative-cn, .narrative-en {
      text-shadow: 0 2px 8px rgba(0,0,0,var(--shadow-opacity, 0.3));
    }
  </style>
</head>
<body>
  <canvas id="visual-canvas"></canvas>
  <div id="phase-indicator">第一章 · 开始</div>
  
  <!-- 开场 Intro -->
  <div id="intro-overlay" class="text-overlay">
    <div class="intro-main">声·命体</div>
    <div class="intro-sub">
      <span class="intro-line"></span>
      <span>Sound Lifeform</span>
      <span class="intro-line"></span>
    </div>
  </div>
  
  <!-- 文案序列 -->
  <div id="narrative-overlay" class="text-overlay">
    <div class="narrative-cn"></div>
    <div class="narrative-en"></div>
  </div>
  
  <div id="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
  <div id="side-menu">
    <div class="section-title">调试</div>
    <div class="slider-row"><label>能量</label><span class="value" id="debug-energy">0</span></div>
    <div class="slider-row"><label>阶段</label><span class="value" id="debug-stage">0</span></div>
    
    <div class="section-title" style="margin-top: 15px;">触发阈值 (能量范围0-10000)</div>
    <div class="slider-row">
      <label>抖动阈值</label>
      <input type="range" id="threshold-motion" min="100" max="5000" value="1500" oninput="STATE.motionThreshold = parseInt(this.value); document.getElementById('val-motion').textContent = this.value">
      <span class="value" id="val-motion">1500</span>
    </div>
    <div class="slider-row">
      <label>发展阈值</label>
      <input type="range" id="threshold-develop" min="1000" max="8000" value="4000" oninput="STATE.developThreshold = parseInt(this.value); document.getElementById('val-develop').textContent = this.value">
      <span class="value" id="val-develop">4000</span>
    </div>
    <div class="slider-row">
      <label>高潮阈值</label>
      <input type="range" id="threshold-climax" min="5000" max="9500" value="7500" oninput="STATE.climaxThreshold = parseInt(this.value); document.getElementById('val-climax').textContent = this.value">
      <span class="value" id="val-climax">7500</span>
    </div>
  </div>
  
  <div id="chapter-panel">
    <button class="chapter-btn active" id="ch-1" onclick="jumpToChapter('ch1')">点</button>
    <button class="chapter-btn" id="ch-2" onclick="jumpToChapter('ch2')">线</button>
    <button class="chapter-btn" id="ch-3" onclick="jumpToChapter('ch3')">面</button>
    <button class="chapter-btn locked" id="ch-4" onclick="" disabled>螺旋</button>
    <button id="reset-btn" onclick="resetSystem()">重置</button>
  </div>
  
  <div id="conn-panel">
    <div class="panel-header">声·命体 v3.0</div>
    <button class="conn-btn" id="ble-main" onclick="startBLE(0)">🔵 连接主手 ESP32</button>
    <button class="conn-btn" id="ble-sub" onclick="startBLE(1)">🔵 连接副手 ESP32</button>
    <div class="energy-bar">
      <span>ENERGY</span>
      <div class="energy-track"><div class="energy-fill" id="energy-fill"></div></div>
      <span id="energy-value">0</span>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // 第一章「点」Three.js 视觉系统
    // 以下代码完整复制自 gemini-frontend/point.html
    // ═══════════════════════════════════════════════════
    
    class Chapter1Point {
      constructor(container) {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000000);
        this.scene.fog = new THREE.FogExp2(0x000000, 0.05);

        this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.z = 8;

        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(this.renderer.domElement);

        this.createGeometry();
        
        this.currentParams = {
          scale: 0.1, noiseAmount: 0.0, rotationSpeed: 0.002,
          ringAlpha: 0.0, ringScale: 0.1, particleAlpha: 0.0, particleSpread: 0.0
        };

        this.targetParams = {
          scale: 0.15, noiseAmount: 0.01, rotationSpeed: 0.001,
          ringAlpha: 0.0, ringScale: 0.5, particleAlpha: 0.0, particleSpread: 0.0
        };

        this.clock = new THREE.Clock();
        this.mouseX = 0; this.mouseY = 0;
        this.targetRotationX = 0; this.targetRotationY = 0;
        
        window.addEventListener('mousemove', (e) => {
          this.mouseX = (e.clientX / window.innerWidth) * 2 - 1;
          this.mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        window.addEventListener('resize', () => this.onResize());
      }

      createGeometry() {
        this.geometry = new THREE.IcosahedronGeometry(2, 16);
        this.wireframeMaterial = new THREE.MeshBasicMaterial({
          color: 0xffffff, wireframe: true, transparent: true, opacity: 0.15
        });
        this.pointsMaterial = new THREE.PointsMaterial({
          color: 0xffffff, size: 0.04, transparent: true, opacity: 0.8
        });
        this.wireframeMesh = new THREE.Mesh(this.geometry, this.wireframeMaterial);
        this.pointsMesh = new THREE.Points(this.geometry, this.pointsMaterial);
        this.shapeGroup = new THREE.Group();
        this.shapeGroup.add(this.wireframeMesh);
        this.shapeGroup.add(this.pointsMesh);
        this.scene.add(this.shapeGroup);
        this.createRings();
        this.createParticles();
        this.saveBasePositions();
      }

      createRings() {
        this.ringsGroup = new THREE.Group();
        this.rings = [];
        for (let i = 0; i < 4; i++) {
          const curve = new THREE.EllipseCurve(0, 0, 3 + i * 0.6, 3 + i * 0.6, 0, 2 * Math.PI, false, 0);
          const pts = curve.getPoints(100);
          const rGeo = new THREE.BufferGeometry().setFromPoints(pts);
          const rMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
          const rLine = new THREE.LineLoop(rGeo, rMat);
          rLine.rotation.x = Math.random() * Math.PI;
          rLine.rotation.y = Math.random() * Math.PI;
          rLine.userData = {
            speedX: (Math.random() - 0.5) * 0.01,
            speedY: (Math.random() - 0.5) * 0.01,
            speedZ: (Math.random() - 0.5) * 0.01,
            material: rMat
          };
          this.rings.push(rLine);
          this.ringsGroup.add(rLine);
        }
        this.scene.add(this.ringsGroup);
      }

      createParticles() {
        this.particleCount = 800;
        this.particleGeo = new THREE.BufferGeometry();
        this.particlePositions = new Float32Array(this.particleCount * 3);
        this.particleBaseDirs = new Float32Array(this.particleCount * 3);
        for (let i = 0; i < this.particleCount; i++) {
          const u = Math.random(), v = Math.random();
          const theta = u * 2.0 * Math.PI;
          const phi = Math.acos(2.0 * v - 1.0);
          const sinPhi = Math.sin(phi);
          this.particleBaseDirs[i * 3] = sinPhi * Math.cos(theta);
          this.particleBaseDirs[i * 3 + 1] = sinPhi * Math.sin(theta);
          this.particleBaseDirs[i * 3 + 2] = Math.cos(phi);
        }
        this.particleGeo.setAttribute('position', new THREE.BufferAttribute(this.particlePositions, 3));
        this.particleMat = new THREE.PointsMaterial({
          color: 0xffffff, size: 0.06, transparent: true, opacity: 0,
          blending: THREE.AdditiveBlending, depthWrite: false
        });
        this.particlesObj = new THREE.Points(this.particleGeo, this.particleMat);
        this.scene.add(this.particlesObj);
      }

      saveBasePositions() {
        const positionAttribute = this.geometry.attributes.position;
        this.vertexCount = positionAttribute.count;
        this.basePositions = new Float32Array(this.vertexCount * 3);
        for (let i = 0; i < this.vertexCount; i++) {
          const x = positionAttribute.getX(i), y = positionAttribute.getY(i), z = positionAttribute.getZ(i);
          const length = Math.sqrt(x * x + y * y + z * z);
          this.basePositions[i * 3] = x / length;
          this.basePositions[i * 3 + 1] = y / length;
          this.basePositions[i * 3 + 2] = z / length;
        }
      }

      setTargetStage(stage) {
        const targets = {
          0: { scale: 0.15, noiseAmount: 0.01, rotationSpeed: 0.001, ringAlpha: 0.0, ringScale: 0.5, particleAlpha: 0.0, particleSpread: 0.0 },
          1: { scale: 1.5, noiseAmount: 0.35, rotationSpeed: 0.006, ringAlpha: 0.0, ringScale: 0.8, particleAlpha: 0.0, particleSpread: 0.0 },
          2: { scale: 1.5, noiseAmount: 0.45, rotationSpeed: 0.008, ringAlpha: 0.1, ringScale: 1.0, particleAlpha: 0.3, particleSpread: 2.0 },
          3: { scale: 1.1, noiseAmount: 0.15, rotationSpeed: 0.015, ringAlpha: 0.3, ringScale: 1.2, particleAlpha: 0.8, particleSpread: 5.0 }
        };
        if (targets[stage]) this.targetParams = targets[stage];
      }

      update() {
        const time = this.clock.getElapsedTime();
        const lerpSpeed = 0.03;
        this.currentParams.scale += (this.targetParams.scale - this.currentParams.scale) * lerpSpeed;
        this.currentParams.noiseAmount += (this.targetParams.noiseAmount - this.currentParams.noiseAmount) * lerpSpeed;
        this.currentParams.rotationSpeed += (this.targetParams.rotationSpeed - this.currentParams.rotationSpeed) * lerpSpeed;
        this.currentParams.ringAlpha += (this.targetParams.ringAlpha - this.currentParams.ringAlpha) * lerpSpeed;
        this.currentParams.ringScale += (this.targetParams.ringScale - this.currentParams.ringScale) * lerpSpeed;
        this.currentParams.particleAlpha += (this.targetParams.particleAlpha - this.currentParams.particleAlpha) * lerpSpeed;
        this.currentParams.particleSpread += (this.targetParams.particleSpread - this.currentParams.particleSpread) * lerpSpeed;

        const positionAttribute = this.geometry.attributes.position;
        for (let i = 0; i < this.vertexCount; i++) {
          const nx = this.basePositions[i * 3], ny = this.basePositions[i * 3 + 1], nz = this.basePositions[i * 3 + 2];
          const noise1 = Math.sin(nx * 3 + time * 1.5) * Math.cos(ny * 3 + time * 1.5) * Math.sin(nz * 3 + time * 1.5);
          const noise2 = Math.sin(nx * 8 - time) * Math.cos(ny * 8 - time) * 0.5;
          const offset = this.currentParams.noiseAmount * (noise1 + noise2);
          const finalRadius = 2.0 * this.currentParams.scale * (1.0 + offset);
          positionAttribute.setXYZ(i, nx * finalRadius, ny * finalRadius, nz * finalRadius);
        }
        positionAttribute.needsUpdate = true;

        this.ringsGroup.scale.set(this.currentParams.ringScale, this.currentParams.ringScale, this.currentParams.ringScale);
        this.rings.forEach(ring => {
          ring.userData.material.opacity = this.currentParams.ringAlpha;
          ring.rotation.x += ring.userData.speedX;
          ring.rotation.y += ring.userData.speedY;
          ring.rotation.z += ring.userData.speedZ;
        });

        this.particleMat.opacity = this.currentParams.particleAlpha;
        if (this.currentParams.particleAlpha > 0.01) {
          const pPositions = this.particleGeo.attributes.position.array;
          const baseRad = 2.0 * this.currentParams.scale;
          for (let i = 0; i < this.particleCount; i++) {
            const dirX = this.particleBaseDirs[i * 3], dirY = this.particleBaseDirs[i * 3 + 1], dirZ = this.particleBaseDirs[i * 3 + 2];
            const pulse = (Math.sin(time * 2 + i) * 0.5 + 0.5);
            const dist = baseRad + this.currentParams.particleSpread * pulse;
            pPositions[i * 3] = dirX * dist;
            pPositions[i * 3 + 1] = dirY * dist;
            pPositions[i * 3 + 2] = dirZ * dist;
          }
          this.particleGeo.attributes.position.needsUpdate = true;
          this.particlesObj.rotation.y += this.currentParams.rotationSpeed * 0.2;
          this.particlesObj.rotation.x += this.currentParams.rotationSpeed * 0.1;
        }

        this.shapeGroup.rotation.y += this.currentParams.rotationSpeed;
        this.shapeGroup.rotation.z += this.currentParams.rotationSpeed * 0.5;
        this.targetRotationX = this.mouseY * 0.5;
        this.targetRotationY = this.mouseX * 0.5;
        this.shapeGroup.rotation.x += (this.targetRotationX - this.shapeGroup.rotation.x) * 0.05;
      }

      render() { this.renderer.render(this.scene, this.camera); }
      onResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
      }
      dispose() {
        if (this.renderer) { this.renderer.dispose(); this.renderer.domElement.remove(); }
      }
    }

    // ═══════════════════════════════════════════════════
    // 第二章「线」Three.js 视觉系统
    // 以下代码完整复制自 gemini-frontend/line.html
    // ═══════════════════════════════════════════════════
    
    class Chapter2Line {
      constructor(container) {
        // 核心配置中心
        this.CONFIG = {
          ISLAND_THICKNESS: 1.2,
          ORBIT_RADIUS_MIN: 32,
          ORBIT_RADIUS_MAX: 48
        };

        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x000000);
        
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
        this.camera.position.set(0, 10, 65);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(this.renderer.domElement);

        this.clock = new THREE.Clock();
        this.mainGroup = new THREE.Group();
        this.scene.add(this.mainGroup);

        this.numLines = 65;
        this.numPoints = 160;
        this.linesData = [];
        this.celestials = [];

        this.params = {
          width: 90,
          spreadZ: 0,
          noiseScale: 0.2,
          noiseAmplitude: 0.0,
          pulseIntensity: 0.0,
          centerFocus: 0,
          islandMask: 0,
          cliffBottom: 0,
          ridgeEffect: 0,
          cameraTiltX: 0.05,
          rotY: 0,
          autoRotate: false,
          celestialAlpha: 0,
          baseYOffset: 0
        };

        this.stages = [
          { width: 90, spreadZ: 0, noiseScale: 0.2, noiseAmplitude: 0.0, pulseIntensity: 0.0, centerFocus: 0, islandMask: 0.0, cliffBottom: 0, ridgeEffect: 0, cameraTiltX: 0.05, rotY: 0, autoRotate: false, celestialAlpha: 0, baseYOffset: 0 },
          { width: 90, spreadZ: 0, noiseScale: 0.2, noiseAmplitude: 0.0, pulseIntensity: 1.0, centerFocus: 0, islandMask: 0.0, cliffBottom: 0, ridgeEffect: 0, cameraTiltX: 0.05, rotY: 0, autoRotate: false, celestialAlpha: 0, baseYOffset: 0 },
          { width: 45, spreadZ: 38, noiseScale: 0.6, noiseAmplitude: 6.5, pulseIntensity: 0.0, centerFocus: 1.0, islandMask: 0.0, cliffBottom: 0.0, ridgeEffect: 1.0, cameraTiltX: 0.55, rotY: 0, autoRotate: false, celestialAlpha: 0, baseYOffset: 2 },
          { width: 45, spreadZ: 42, noiseScale: 0.7, noiseAmplitude: 7.0, pulseIntensity: 0.0, centerFocus: 1.0, islandMask: 1.0, cliffBottom: 1.0, ridgeEffect: 0.8, cameraTiltX: 0.35, rotY: Math.PI / 5, autoRotate: true, celestialAlpha: 1.0, baseYOffset: 10 }
        ];

        this.targetStage = 0;
        this.init();
        window.addEventListener('resize', () => this.onResize());
      }

      init() {
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
        const meshMaterial = new THREE.MeshBasicMaterial({
          color: 0x000000,
          side: THREE.DoubleSide,
          depthWrite: true,
          polygonOffset: true,
          polygonOffsetFactor: 1,
          polygonOffsetUnits: 1
        });

        for (let i = 0; i < this.numLines; i++) {
          const lineGeom = new THREE.BufferGeometry();
          const linePositions = new Float32Array(this.numPoints * 3);
          lineGeom.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
          const line = new THREE.Line(lineGeom, lineMaterial);

          const meshGeom = new THREE.BufferGeometry();
          const meshPositions = new Float32Array(this.numPoints * 2 * 3);
          const indices = [];
          for (let j = 0; j < this.numPoints - 1; j++) {
            const top1 = j * 2;
            const bot1 = j * 2 + 1;
            const top2 = (j + 1) * 2;
            const bot2 = (j + 1) * 2 + 1;
            indices.push(top1, bot1, top2);
            indices.push(bot1, bot2, top2);
          }
          meshGeom.setAttribute('position', new THREE.BufferAttribute(meshPositions, 3));
          meshGeom.setIndex(indices);
          const mesh = new THREE.Mesh(meshGeom, meshMaterial);

          this.mainGroup.add(mesh);
          this.mainGroup.add(line);
          this.linesData.push({ lineGeom, meshGeom });
        }

        // 极简几何厚度底座构建
        this.baseBoxGroup = new THREE.Group();
        this.baseBoxGeo = new THREE.BufferGeometry();
        const boxPos = new Float32Array(8 * 3);
        this.baseBoxGeo.setAttribute('position', new THREE.BufferAttribute(boxPos, 3));

        this.baseBoxGeo.setIndex([
          0, 1, 1, 2, 2, 3, 3, 0,
          4, 5, 5, 6, 6, 7, 7, 4,
          0, 4, 1, 5, 2, 6, 3, 7
        ]);
        this.baseBoxLines = new THREE.LineSegments(this.baseBoxGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 }));

        const solidGeo = new THREE.BufferGeometry();
        solidGeo.setAttribute('position', new THREE.BufferAttribute(boxPos, 3));
        solidGeo.setIndex([
          0, 1, 5, 0, 5, 4,
          1, 2, 6, 1, 6, 5,
          2, 3, 7, 2, 7, 6,
          3, 0, 4, 3, 4, 7,
          3, 2, 1, 3, 1, 0
        ]);
        this.baseBoxSolid = new THREE.Mesh(solidGeo, new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: 4, polygonOffsetUnits: 4 }));

        this.baseBoxGroup.add(this.baseBoxLines);
        this.baseBoxGroup.add(this.baseBoxSolid);
        this.mainGroup.add(this.baseBoxGroup);

        // 宇宙中心：绕岛穿梭的星体轨道组
        this.celestialGroup = new THREE.Group();
        this.mainGroup.add(this.celestialGroup);
        this.celestialGroup.position.y = -this.CONFIG.ISLAND_THICKNESS / 2;

        const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthWrite: false });

        const geo1 = new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.SphereGeometry(1.6, 10, 10)), mat.clone());
        const geo2 = new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.CylinderGeometry(1.2, 1.2, 2.0, 10, 3)), mat.clone());
        const geo3 = new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.TetrahedronGeometry(1.8)), mat.clone());
        const geo4 = new THREE.Group();
        const mainBox = new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.BoxGeometry(1.5, 1.5, 1.5, 2, 2, 2)), mat.clone());
        const earGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5, 1, 1, 1);
        const ear1 = new THREE.LineSegments(new THREE.WireframeGeometry(earGeo), mat.clone()); ear1.position.set(1.1, 0, 0);
        const ear2 = new THREE.LineSegments(new THREE.WireframeGeometry(earGeo), mat.clone()); ear2.position.set(-1.1, 0, 0);
        geo4.add(mainBox, ear1, ear2);
        const geo5 = new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.OctahedronGeometry(1.6)), mat.clone());
        const geo6 = new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(1.5)), mat.clone());

        const celestialMeshes = [geo1, geo2, geo3, geo4, geo5, geo6];

        for (let i = 0; i < 6; i++) {
          const orbitGroup = new THREE.Group();
          const radius = this.CONFIG.ORBIT_RADIUS_MIN + Math.random() * (this.CONFIG.ORBIT_RADIUS_MAX - this.CONFIG.ORBIT_RADIUS_MIN);
          const speed = (0.08 + Math.random() * 0.15) * (i % 2 === 0 ? 1 : -1);
          const phase = Math.random() * Math.PI * 2;

          orbitGroup.rotation.x = (Math.random() - 0.5) * 0.8;
          orbitGroup.rotation.z = (Math.random() - 0.5) * 0.8;

          const trailGeo = new THREE.BufferGeometry();
          const trailPts = [];
          const segments = 64;
          for (let j = 0; j <= segments; j++) {
            const a = (j / segments) * Math.PI * 2;
            trailPts.push(Math.cos(a) * radius, 0, Math.sin(a) * radius);
          }
          trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(trailPts, 3));
          const trailLine = new THREE.Line(trailGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthWrite: false }));
          orbitGroup.add(trailLine);

          orbitGroup.add(celestialMeshes[i]);
          this.celestialGroup.add(orbitGroup);
          this.celestials.push({ orbitGroup, mesh: celestialMeshes[i], trailLine, radius, speed, phase });
        }
      }

      fbm(x, z, t, scale) {
        let y = 0;
        y += Math.sin(x * scale * 1.0 + t * 1.2) * Math.cos(z * scale * 1.0 + t * 0.8) * 1.0;
        y += Math.sin(x * scale * 2.1 - t * 1.5) * Math.cos(z * scale * 2.1 + t * 1.1) * 0.5;
        y += Math.sin(x * scale * 3.7 + t * 2.0) * Math.cos(z * scale * 3.7 - t * 0.9) * 0.25;
        return y;
      }

      setTargetStage(stage) {
        // stage 0-3 对应 line.html 的 4 个阶段
        if (stage >= 0 && stage <= 3) {
          this.targetStage = stage;
        }
      }

      update() {
        const time = this.clock.getElapsedTime();
        const dt = 0.04;

        const target = this.stages[this.targetStage];
        this.params.width += (target.width - this.params.width) * dt;
        this.params.spreadZ += (target.spreadZ - this.params.spreadZ) * dt;
        this.params.noiseScale += (target.noiseScale - this.params.noiseScale) * dt;
        this.params.noiseAmplitude += (target.noiseAmplitude - this.params.noiseAmplitude) * dt;
        this.params.pulseIntensity += (target.pulseIntensity - this.params.pulseIntensity) * dt;
        this.params.centerFocus += (target.centerFocus - this.params.centerFocus) * dt;
        this.params.islandMask += (target.islandMask - this.params.islandMask) * dt;
        this.params.cliffBottom += (target.cliffBottom - this.params.cliffBottom) * dt;
        this.params.ridgeEffect += (target.ridgeEffect - this.params.ridgeEffect) * dt;
        this.params.cameraTiltX += (target.cameraTiltX - this.params.cameraTiltX) * dt;
        this.params.celestialAlpha += (target.celestialAlpha - this.params.celestialAlpha) * dt;
        this.params.baseYOffset += (target.baseYOffset - this.params.baseYOffset) * dt;

        if (target.autoRotate) {
          this.params.rotY += 0.0015;
        } else {
          this.params.rotY += (target.rotY - this.params.rotY) * dt;
        }

        this.mainGroup.rotation.x = this.params.cameraTiltX;
        this.mainGroup.rotation.y = this.params.rotY;
        this.mainGroup.position.y = this.params.baseYOffset;

        const pulsePos = Math.sin(time * 1.5) * 0.45;

        const getTerrainY = (nX, nZ) => {
          const x = nX * this.params.width;
          const z = nZ * this.params.spreadZ;
          const rawNoise = this.fbm(x, z, time, this.params.noiseScale);
          const blendedNoise = rawNoise * (1 - this.params.ridgeEffect) + Math.abs(rawNoise) * this.params.ridgeEffect;
          const bellX = Math.exp(-Math.pow(nX * 6, 2));
          const bellZ = Math.exp(-Math.pow(nZ * 6, 2));
          const currentZMask = 1.0 * (1 - this.params.islandMask) + bellZ * this.params.islandMask;
          const finalMask = 1.0 * (1 - this.params.centerFocus) + (bellX * currentZMask) * this.params.centerFocus;
          return blendedNoise * this.params.noiseAmplitude * finalMask;
        };

        // 1. 更新立方体底座
        if (this.params.cliffBottom > 0.01) {
          this.baseBoxGroup.visible = true;
          this.baseBoxLines.material.opacity = this.params.cliffBottom * 0.9;
          this.baseBoxSolid.material.transparent = true;
          this.baseBoxSolid.material.opacity = this.params.cliffBottom;

          const pos = this.baseBoxGeo.attributes.position.array;
          const bW = (this.params.width / 2) + 0.05;
          const bZ = (this.params.spreadZ / 2) + 0.05;
          const topY = 0;
          const bottomY = -this.CONFIG.ISLAND_THICKNESS;

          pos[0] = -bW; pos[1] = bottomY; pos[2] = -bZ;
          pos[3] = bW; pos[4] = bottomY; pos[5] = -bZ;
          pos[6] = bW; pos[7] = bottomY; pos[8] = bZ;
          pos[9] = -bW; pos[10] = bottomY; pos[11] = bZ;

          pos[12] = -bW; pos[13] = topY; pos[14] = -bZ;
          pos[15] = bW; pos[16] = topY; pos[17] = -bZ;
          pos[18] = bW; pos[19] = topY; pos[20] = bZ;
          pos[21] = -bW; pos[22] = topY; pos[23] = bZ;

          this.baseBoxGeo.attributes.position.needsUpdate = true;
        } else {
          this.baseBoxGroup.visible = false;
        }

        // 2. 更新地形线条
        for (let i = 0; i < this.numLines; i++) {
          const nZ = (i / (this.numLines - 1)) - 0.5;
          const z = nZ * this.params.spreadZ;
          const linePos = this.linesData[i].lineGeom.attributes.position.array;
          const meshPos = this.linesData[i].meshGeom.attributes.position.array;

          for (let j = 0; j < this.numPoints; j++) {
            const nX = (j / (this.numPoints - 1)) - 0.5;
            const x = nX * this.params.width;

            const yBase = getTerrainY(nX, nZ);
            const distToPulse = Math.abs(nX - pulsePos);
            const rhythm = 1.0 + Math.sin(time * 8.0) * 0.3;
            const pulseBase = Math.exp(-Math.pow(distToPulse * 15, 2)) * 3.0;
            const pulseEnvelope = Math.exp(-Math.pow(distToPulse * 25, 2));
            const wiggle = Math.abs(Math.sin(distToPulse * 30 - time * 15)) * 2.5;
            const y = yBase + ((pulseBase + wiggle * pulseEnvelope) * rhythm * this.params.pulseIntensity);

            const skirtBottom = -this.CONFIG.ISLAND_THICKNESS + 0.05;
            const finalBottomY = -15 * (1 - this.params.cliffBottom) + skirtBottom * this.params.cliffBottom;

            linePos[j * 3] = x;
            linePos[j * 3 + 1] = y;
            linePos[j * 3 + 2] = z;

            meshPos[j * 6] = x;
            meshPos[j * 6 + 1] = y;
            meshPos[j * 6 + 2] = z;
            meshPos[j * 6 + 3] = x;
            meshPos[j * 6 + 4] = finalBottomY;
            meshPos[j * 6 + 5] = z;
          }
          this.linesData[i].lineGeom.attributes.position.needsUpdate = true;
          this.linesData[i].meshGeom.attributes.position.needsUpdate = true;
        }

        // 3. 更新宇宙中心的轨道群组
        if (this.params.celestialAlpha > 0.01) {
          this.celestialGroup.rotation.y -= 0.002;

          this.celestials.forEach(c => {
            c.orbitGroup.visible = true;
            c.trailLine.material.opacity = this.params.celestialAlpha * 0.12;
            c.mesh.traverse((child) => {
              if (child.isLineSegments) {
                child.material.opacity = this.params.celestialAlpha * 0.5;
              }
            });

            const t = time * c.speed + c.phase;
            c.mesh.position.x = Math.cos(t) * c.radius;
            c.mesh.position.z = Math.sin(t) * c.radius;

            c.mesh.rotation.y += 0.01;
            c.mesh.rotation.x += 0.015;
          });
        } else {
          this.celestials.forEach(c => c.orbitGroup.visible = false);
        }
      }

      render() {
        this.renderer.render(this.scene, this.camera);
      }

      onResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
      }

      dispose() {
        if (this.renderer) {
          this.renderer.dispose();
          this.renderer.domElement.remove();
        }
      }
    }

    // ═══════════════════════════════════════════════════
    // 第三章「面」Three.js 视觉系统
    // 以下代码完整复制自 gemini-frontend/face.html
    // ═══════════════════════════════════════════════════

    class Chapter3Face {
      constructor(container) {
        // === 1. 场景与相机基础设置 ===
        this.scene = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x000000, 0.02);

        this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);

        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        // 不添加任何样式，保持与 face.html 一致
        container.appendChild(this.renderer.domElement);

        // === 2. 构建环境网格 (类似 Blender 地板) ===
        this.gridGroup = new THREE.Group();
        this.gridHelper = new THREE.GridHelper(100, 50, 0x666666, 0x222222);
        this.gridHelper.position.y = -2;
        this.gridHelper.material.transparent = true;
        this.gridHelper.material.opacity = 1.0;
        this.gridGroup.add(this.gridHelper);

        // 天花板网格 (高潮时开启)
        this.topGridHelper = new THREE.GridHelper(100, 50, 0x666666, 0x222222);
        this.topGridHelper.position.y = 2;
        this.topGridHelper.material.transparent = true;
        this.topGridHelper.material.opacity = 0;
        this.gridGroup.add(this.topGridHelper);

        // 穿梭网格门 (Warp Gates 穿膜效果)
        this.warpGates = [];
        for (let i = 0; i < 5; i++) {
          const gate = new THREE.GridHelper(40, 20, 0x888888, 0x333333);
          gate.rotation.x = Math.PI / 2;
          gate.position.z = -10 - i * 12;
          gate.visible = false;
          gate.material.transparent = true;
          gate.material.opacity = 0;
          this.warpGates.push(gate);
          this.gridGroup.add(gate);
        }

        this.scene.add(this.gridGroup);

        // === 3. 构建核心几何体 (魔方与切片) ===
        this.cubes = [];
        this.size = 0.95;
        this.spacing = 1.0;
        this.mainGroup = new THREE.Group();
        this.scene.add(this.mainGroup);

        this.pivot = new THREE.Group();
        this.mainGroup.add(this.pivot);

        const geometry = new THREE.BoxGeometry(this.size, this.size, this.size);
        const edgesGeo = new THREE.EdgesGeometry(geometry);

        for (let x = -1; x <= 1; x++) {
          for (let y = -1; y <= 1; y++) {
            for (let z = -1; z <= 1; z++) {
              const wrapper = new THREE.Group();

              // 黑底实心填充
              const meshMat = new THREE.MeshBasicMaterial({
                color: 0x000000,
                side: THREE.DoubleSide
              });
              const solidMesh = new THREE.Mesh(geometry, meshMat);

              // 纯白边框线
              const lineMat = new THREE.LineBasicMaterial({
                color: 0xffffff,
                linewidth: 2
              });
              const edgeLines = new THREE.LineSegments(edgesGeo, lineMat);

              solidMesh.add(edgeLines);
              wrapper.add(solidMesh);

              wrapper.userData = {
                initX: x, initY: y, initZ: z,
                solidMesh: solidMesh
              };

              wrapper.position.set(x * this.spacing, y * this.spacing, z * this.spacing);
              wrapper.scale.set(0, 0, 0);

              this.mainGroup.add(wrapper);
              this.cubes.push(wrapper);
            }
          }
        }

        // === 4. 构建粒子喷射系统 ===
        this.particleCount = 60;
        this.particles = [];
        const pGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        const pEdgesGeo = new THREE.EdgesGeometry(pGeo);

        const pMeshMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const pLineMat = new THREE.LineBasicMaterial({ color: 0xffffff });

        for (let i = 0; i < this.particleCount; i++) {
          const pGroup = new THREE.Group();
          const pMesh = new THREE.Mesh(pGeo, pMeshMat);
          const pLines = new THREE.LineSegments(pEdgesGeo, pLineMat);
          pMesh.add(pLines);
          pGroup.add(pMesh);

          pGroup.userData = {
            velocity: new THREE.Vector3(),
            rotSpeed: new THREE.Vector3(Math.random() * 0.3, Math.random() * 0.3, Math.random() * 0.3),
            active: false
          };
          pGroup.visible = false;
          this.particles.push(pGroup);
          this.scene.add(pGroup);
        }

        // === 5. 核心状态与叙事控制 ===
        this.currentPhase = 0;
        this.isTwisting = false;
        this.animState = { globalSpeed: 0 };
        this.clock = new THREE.Clock();

        // 初始化相机位置 - 完全复制自 face.html
        // 开场假装是一个静止的3D网格空间
        this.camera.position.set(8, 6, 8);
        this.camera.lookAt(0, 0, 0);

        window.addEventListener('resize', () => this.onResize());
      }

      burstParticle(p) {
        const radius = 1.0;
        p.position.set(
          (Math.random() - 0.5) * radius,
          (Math.random() - 0.5) * radius,
          (Math.random() - 0.5) * radius
        );
        p.userData.velocity.set(
          (Math.random() - 0.5) * 1.5,
          (Math.random() - 0.5) * 1.5,
          Math.random() * 0.8 + 0.5
        );
        p.userData.life = 0;
        p.userData.lifeStep = 0.01 + Math.random() * 0.02;
        p.visible = true;
        p.userData.active = true;
      }

      setPhase(phase) {
        if (this.currentPhase === phase) return;
        this.currentPhase = phase;

        if (phase < 3) {
          this.isTwisting = false;
        }

        if (phase === 1) this.triggerPhase1();
        else if (phase === 2) this.triggerPhase2();
        else if (phase === 3) this.triggerPhase3();
        else if (phase === 4) this.triggerPhase4();
      }

      triggerPhase1() {
        gsap.to(this.animState, { globalSpeed: 0, duration: 2 });

        gsap.to(this.camera.position, { x: 2, y: 2, z: 4, duration: 2.5, ease: "power3.inOut" });

        gsap.to(this.gridHelper.material, { opacity: 0, duration: 2 });
        gsap.to(this.topGridHelper.material, { opacity: 0, duration: 2 });

        this.warpGates.forEach(gate => {
          gsap.to(gate.material, { opacity: 0, duration: 1, onComplete: () => gate.visible = false });
        });

        this.particles.forEach(p => p.visible = false);

        this.cubes.forEach(wrapper => {
          gsap.killTweensOf(wrapper.scale);
          gsap.killTweensOf(wrapper.position);
          gsap.killTweensOf(wrapper.quaternion);

          wrapper.quaternion.identity();
          wrapper.position.set(wrapper.userData.initX * this.spacing, wrapper.userData.initY * this.spacing, wrapper.userData.initZ * this.spacing);

          wrapper.userData.solidMesh.material.color.setHex(0x000000);
          wrapper.userData.solidMesh.visible = true;

          if (wrapper.userData.initX === 0 && wrapper.userData.initY === 0 && wrapper.userData.initZ === 0) {
            gsap.to(wrapper.scale, { x: 1, y: 1, z: 0.01, duration: 1.5, ease: "back.out(1.2)" });
          } else {
            gsap.to(wrapper.scale, { x: 0, y: 0, z: 0, duration: 1 });
          }
        });

        gsap.to(this.mainGroup.rotation, { x: 0, y: 0, z: 0, duration: 2 });
        gsap.to(this.mainGroup.position, { x: 0, y: 0, duration: 1 });
      }

      triggerPhase2() {
        gsap.to(this.animState, { globalSpeed: 0, duration: 2 });

        gsap.to(this.camera.position, { x: 2.5, y: 2, z: 5, duration: 2.5, ease: "power2.inOut" });
        gsap.to(this.gridHelper.material, { opacity: 0, duration: 1 });
        gsap.to(this.topGridHelper.material, { opacity: 0, duration: 1 });

        this.warpGates.forEach(gate => {
          gsap.to(gate.material, { opacity: 0, duration: 1, onComplete: () => gate.visible = false });
        });

        this.particles.forEach(p => p.visible = false);

        this.cubes.forEach(wrapper => {
          gsap.killTweensOf(wrapper.scale);
          gsap.killTweensOf(wrapper.position);
          gsap.killTweensOf(wrapper.quaternion);

          wrapper.quaternion.identity();
          wrapper.position.set(wrapper.userData.initX * this.spacing, wrapper.userData.initY * this.spacing, wrapper.userData.initZ * this.spacing);
          wrapper.userData.solidMesh.material.color.setHex(0x000000);
          wrapper.userData.solidMesh.visible = true;

          if (wrapper.userData.initZ === 0) {
            const delay = (Math.abs(wrapper.userData.initX) + Math.abs(wrapper.userData.initY)) * 0.1;
            gsap.to(wrapper.scale, { x: 1, y: 1, z: 0.01, duration: 1.5, delay: delay, ease: "back.out(1.5)" });
          } else {
            gsap.to(wrapper.scale, { x: 0, y: 0, z: 0, duration: 1 });
          }
        });

        gsap.to(this.mainGroup.rotation, { x: 0, y: 0, z: 0, duration: 2 });
        gsap.to(this.mainGroup.position, { x: 0, y: 0, duration: 1 });
      }

      triggerPhase3() {
        gsap.to(this.animState, { globalSpeed: 0.0, duration: 2, ease: "power2.out" });

        gsap.to(this.camera.position, { x: 4, y: 3, z: 6, duration: 3, ease: "power2.inOut" });

        gsap.to(this.gridHelper.material, { opacity: 0.3, duration: 2 });
        gsap.to(this.topGridHelper.material, { opacity: 0.3, duration: 2 });

        this.warpGates.forEach((gate) => {
          gsap.to(gate.material, { opacity: 0, duration: 1.5, onComplete: () => gate.visible = false });
        });

        this.cubes.forEach(wrapper => {
          const delay = Math.random() * 0.5;
          gsap.to(wrapper.scale, { x: 1, y: 1, z: 1, duration: 1.2, delay: delay, ease: "elastic.out(1, 0.5)" });
        });

        this.particles.forEach(p => p.visible = false);

        gsap.to(this.mainGroup.position, { x: 0, y: 0, duration: 1 });

        setTimeout(() => { if (!this.isTwisting && (this.currentPhase === 3 || this.currentPhase === 4)) this.twistRandomLayer(); }, 1500);
      }

      triggerPhase4() {
        gsap.to(this.animState, { globalSpeed: 1.0, duration: 3, ease: "power2.in" });

        gsap.to(this.camera.position, { x: 4, y: 3, z: 6, duration: 3, ease: "power2.inOut" });

        gsap.to(this.gridHelper.material, { opacity: 0.5, duration: 2 });
        gsap.to(this.topGridHelper.material, { opacity: 0.5, duration: 2 });

        this.warpGates.forEach((gate, i) => {
          if (!gate.visible) {
            gate.position.z = -10 - i * 12;
            gate.visible = true;
            gate.material.opacity = 0;
          }
          gsap.to(gate.material, { opacity: 0.5, duration: 2.5, ease: "power1.inOut" });
        });

        this.cubes.forEach(wrapper => {
          gsap.to(wrapper.scale, { x: 1, y: 1, z: 1, duration: 1.2, ease: "elastic.out(1, 0.5)" });
        });

        this.particles.forEach(p => this.burstParticle(p));

        setTimeout(() => { if (!this.isTwisting && (this.currentPhase === 3 || this.currentPhase === 4)) this.twistRandomLayer(); }, 1500);
      }

      twistRandomLayer() {
        if (this.currentPhase !== 3 && this.currentPhase !== 4) { this.isTwisting = false; return; }
        this.isTwisting = true;

        const axes = ['x', 'y', 'z'];
        const axis = axes[Math.floor(Math.random() * 3)];
        const targetSlice = (Math.floor(Math.random() * 3) - 1) * this.spacing;

        const layerWrappers = [];
        this.cubes.forEach(wrapper => {
          if (Math.abs(wrapper.position[axis] - targetSlice) < 0.1) layerWrappers.push(wrapper);
        });

        this.pivot.rotation.set(0, 0, 0);
        this.pivot.position.set(0, 0, 0);
        layerWrappers.forEach(wrapper => this.pivot.attach(wrapper));

        const direction = Math.random() > 0.5 ? 1 : -1;
        const animProps = {
          duration: 0.6,
          ease: "back.inOut(1.4)",
          onComplete: () => {
            layerWrappers.forEach(wrapper => this.mainGroup.attach(wrapper));
            this.cubes.forEach(wrapper => {
              wrapper.position.x = Math.round(wrapper.position.x / this.spacing) * this.spacing;
              wrapper.position.y = Math.round(wrapper.position.y / this.spacing) * this.spacing;
              wrapper.position.z = Math.round(wrapper.position.z / this.spacing) * this.spacing;

              const euler = new THREE.Euler().setFromQuaternion(wrapper.quaternion);
              euler.x = Math.round(euler.x / (Math.PI / 2)) * (Math.PI / 2);
              euler.y = Math.round(euler.y / (Math.PI / 2)) * (Math.PI / 2);
              euler.z = Math.round(euler.z / (Math.PI / 2)) * (Math.PI / 2);
              wrapper.quaternion.setFromEuler(euler);
            });
            this.isTwisting = false;
            setTimeout(() => this.twistRandomLayer(), 100);
          }

        const time = this.clock.getElapsedTime();

        // 1. 展开部的微波律动 (Phase 2)
        if (this.currentPhase === 2) {
          this.cubes.forEach(wrapper => {
            if (wrapper.userData.initZ === 0) {
              const offset = wrapper.userData.initX * 0.5 + wrapper.userData.initY * 0.5;
              const floatZ = Math.sin(time * 2 + offset) * 0.15;
              wrapper.position.z = floatZ;
            }
          });
        }

        // 2. 高潮一阶与二阶的共通特效
        if (this.currentPhase === 3 || this.currentPhase === 4) {
          this.mainGroup.rotation.x += 0.005;
          this.mainGroup.rotation.y += 0.008;

          if (Math.random() > 0.2) {
            const randomCube = this.cubes[Math.floor(Math.random() * this.cubes.length)];
            randomCube.userData.solidMesh.visible = Math.random() > 0.4;

          if (this.gridGroup.position.z > 10) this.gridGroup.position.z = 0;

            if (gate.position.z > this.camera.position.z + 2) {
              gate.position.z -= 60;
            }
          });

          this.mainGroup.position.x = Math.sin(time * 30) * 0.04 * this.animState.globalSpeed;
          this.mainGroup.position.y = Math.cos(time * 35) * 0.04 * this.animState.globalSpeed;

          this.particles.forEach(p => {
            if (p.userData.active) {
              p.userData.life += p.userData.lifeStep * this.animState.globalSpeed;

              const scale = Math.sin(Math.min(p.userData.life, 1.0) * Math.PI);
              p.scale.setScalar(scale);

              p.position.addScaledVector(p.userData.velocity, this.animState.globalSpeed * 0.4);
              p.rotation.x += p.userData.rotSpeed.x * this.animState.globalSpeed;
              p.rotation.y += p.userData.rotSpeed.y * this.animState.globalSpeed;
              p.rotation.z += p.userData.rotSpeed.z * this.animState.globalSpeed;

              if (p.userData.life >= 1.0 || p.position.z > this.camera.position.z) {
                this.burstParticle(p);
              }
            }
          });
        }
      }

    class FlyoverSystem {
      constructor() {
        this.isActive = false;
        this.peakStartTime = null;
        this.cameraZ = 0;        // 相机深度（0=正常，1=推进到最近）
        this.scrollOffset = 0;   // 线条滚动偏移
        this.edgeOpacity = 0;    // 上下边缘填充透明度
      }
      
      update(totalEnergy) {
        // 追踪峰值状态
        if (totalEnergy >= 95) {
          if (!this.peakStartTime) {
            this.peakStartTime = Date.now();
          }
          
          const peakDuration = Date.now() - this.peakStartTime;
          
          // 5秒后激活俯瞰效果
          if (peakDuration > 5000) {
            this.isActive = true;
          }
          
          // 相机推进（8秒完成推进）
          const progress = Math.min(1, (peakDuration - 5000) / 8000);
          this.cameraZ = progress; // 0→1
          
          // 上下边缘填充渐显
          this.edgeOpacity = Math.min(0.6, this.edgeOpacity + 0.02);
          
        } else {
          this.peakStartTime = null;
          this.isActive = false;
          this.cameraZ = Math.max(0, this.cameraZ - 0.05);
          this.edgeOpacity = Math.max(0, this.edgeOpacity - 0.03);
        }
        
        // 持续滚动（像无人机向前飞）
        if (this.isActive || this.cameraZ > 0.01) {
          this.scrollOffset += 0.5 + this.cameraZ * 2; // 速度随推进加快
        }
      }
      
      draw(ctx, width, height) {
        if (this.edgeOpacity > 0.01) {
          this.drawEdgeFill(ctx, width, height);
        }
      }
      
      drawEdgeFill(ctx, width, height) {
        // 上方渐变填充
        const topGradient = ctx.createLinearGradient(0, 0, 0, height * 0.25);
        topGradient.addColorStop(0, `rgba(255, 255, 255, ${this.edgeOpacity * 0.3})`);
        topGradient.addColorStop(0.5, `rgba(255, 255, 255, ${this.edgeOpacity * 0.15})`);
        topGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        
        ctx.fillStyle = topGradient;
        ctx.fillRect(0, 0, width, height * 0.25);
        
        // 下方渐变填充
        const bottomGradient = ctx.createLinearGradient(0, height * 0.75, 0, height);
        bottomGradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
        bottomGradient.addColorStop(0.5, `rgba(255, 255, 255, ${this.edgeOpacity * 0.15})`);
        bottomGradient.addColorStop(1, `rgba(255, 255, 255, ${this.edgeOpacity * 0.3})`);
        
        ctx.fillStyle = bottomGradient;
        ctx.fillRect(0, height * 0.75, width, height * 0.25);
      }
      
      // 获取相机推进后的Y坐标偏移
      getYOffset(originalY, layerIndex, totalLayers) {
        if (this.cameraZ < 0.01) return originalY;
        
        // 推进时，远处的层（小的index）移动更多，营造透视感
        const depthRatio = layerIndex / (totalLayers - 1 || 1);
        const perspectiveShift = this.cameraZ * 150 * (1 - depthRatio);
        
        // 持续向下滚动
        const scrollShift = (this.scrollOffset + layerIndex * 10) % 200;
        
        return originalY + perspectiveShift + scrollShift * 0.3;
      }
      
      // 获取推进后的线条粗细（近大远小）
      getLineWidth(baseWidth, layerIndex, totalLayers) {
        if (this.cameraZ < 0.01) return baseWidth;
        
        const depthRatio = layerIndex / (totalLayers - 1 || 1);
        // 前景（大的index）变粗，后景（小的index）变细
        return baseWidth * (0.5 + this.cameraZ * 0.5 + depthRatio * (1 + this.cameraZ));
      }

    function drawChapter2(ctx, cx, cy, width, height) {
      const P = STATE.morphProgress;
      const numLayers = Math.floor(1 + P * 29);
      
      // 视图参数（可调节）
      const viewW = width * 0.95;
      const spacingY = STATE.lineSpacing;
      const elev = cy + STATE.verticalOffset + height * 0.1;
      const marginTop = STATE.marginTop;
      const marginBottom = STATE.marginBottom;
      const usableHeight = height - marginTop - marginBottom;
      
      // 从远到近绘制
      for (let i = numLayers - 1; i >= 0; i--) {
        const normZ = i / (numLayers - 1 || 1);
        
        // Y位置
        const baseY = elev - i * spacingY;
        const y = flyoverSystem.getYOffset(baseY, i, numLayers);
        
        // 检查是否在有效范围内
        if (y < marginTop || y > height - marginBottom) continue;
        
        // 深度渐变
        let alpha;
        if (STATE.enableYGradient) {
          const usableY = y - marginTop;
          const screenRatio = usableY / usableHeight;
          if (screenRatio < 0.5) {
            alpha = 0.2 + screenRatio * 1.6;
          } else {
            alpha = 1.0 - (screenRatio - 0.5) * 0.8;
          }
          alpha = Math.max(0.15, Math.min(1.0, alpha));
        } else {
          alpha = 0.3 + normZ * 0.7;
        }
        
        // 绘制波形
        const points = 140;
        const startX = (width - viewW) / 2;
        const pts = [];
        
        // 预计算所有点
        for (let p = 0; p <= points; p++) {
          const progress = p / points;
          const x = startX + progress * viewW;
          const nx = progress - 0.5;
          
          let bell = Math.exp(-Math.pow(nx * 7, 2));
          if (Math.abs(nx) >= 0.45) bell = 0;
          
          const t = STATE.wavePhase + flyoverSystem.scrollOffset * 0.01;
          const noise = Math.sin(p * 0.15 + t + i * 0.3) + Math.cos(p * 0.35 - t * 0.6 + i * 0.2) * 0.5;
          const ridge = Math.abs(noise);
          
          const baseAmp = 20 + P * 50;
          const depthAmp = 0.5 + normZ * 0.5;
          const amp = ridge * baseAmp * bell * depthAmp;
          
          const py = y - amp;
          pts.push({x, y: py, progress, bell});
        }
        
        // 绘制线条（支持笔刷效果）
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.lineCap = 'round';
        
        const segments = 20;
        const ptsPerSeg = Math.floor(pts.length / segments);
        
        for (let seg = 0; seg < segments; seg++) {
          const startIdx = seg * ptsPerSeg;
          const endIdx = Math.min((seg + 1) * ptsPerSeg, pts.length - 1);
          
          const segCenter = (seg + 0.5) / segments;
          const brushFactor = 1 - Math.abs(segCenter - 0.5) * 2;
          
          let lw;
          if (STATE.enableLineWidthVar) {
            lw = flyoverSystem.getLineWidth(1.4, i, numLayers);
          } else {
            const centerW = STATE.lineWidthCenter;
            const edgeW = STATE.lineWidthEdge;
            lw = edgeW + (centerW - edgeW) * brushFactor;
          }
          ctx.lineWidth = lw;
          
          ctx.beginPath();
          for (let k = startIdx; k <= endIdx; k++) {
            if (k === startIdx) ctx.moveTo(pts[k].x, pts[k].y);
            else ctx.lineTo(pts[k].x, pts[k].y);
          }
          ctx.stroke();
        }
        
        // 底部填充
        if (STATE.enableBottomFill && pts.length > 0) {
          ctx.beginPath();
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let k = 1; k < pts.length; k++) {
            ctx.lineTo(pts[k].x, pts[k].y);
          }
          ctx.lineTo(pts[pts.length - 1].x, height + 100);
          ctx.lineTo(pts[0].x, height + 100);
          ctx.closePath();
          ctx.fillStyle = '#000';
          ctx.fill();

            ctx.fillStyle = `rgba(255, 255, 255, ${particleOpacity * 0.3})`;

              if (pts[k].bell > 0.5) {
                const px = pts[k].x;

                for (let pp = 0; pp < 3; pp++) {
                  const py2 = py + Math.random() * 20;

                  ctx.beginPath();
                  ctx.arc(px2, py2, size, 0, Math.PI * 2);
                  ctx.fill();
                }
              }
            }
          }
        }
      }
      
      flyoverSystem.draw(ctx, width, height);
    }

        window.addEventListener('resize', () => this.resize());
        
        // 创建第一章 Three.js 视觉系统
        this.chapter1 = new Chapter1Point(document.body);
        this.chapter1Canvas = this.chapter1.renderer.domElement;
        this.chapter1Canvas.style.position = 'fixed';
        this.chapter1Canvas.style.top = '0';
        this.chapter1Canvas.style.left = '0';
        this.chapter1Canvas.style.width = '100%';
        this.chapter1Canvas.style.height = '100%';
        this.chapter1Canvas.style.zIndex = '0';
        
        // 创建第二章 Three.js 视觉系统
        this.chapter2 = new Chapter2Line(document.body);
        this.chapter2Canvas = this.chapter2.renderer.domElement;
        this.chapter2Canvas.style.position = 'fixed';
        this.chapter2Canvas.style.top = '0';
        this.chapter2Canvas.style.left = '0';
        this.chapter2Canvas.style.width = '100%';
        this.chapter2Canvas.style.height = '100%';
        this.chapter2Canvas.style.zIndex = '0';
        this.chapter2Canvas.style.display = 'none';

        // 创建第三章 Three.js 视觉系统
        // 创建专门的容器，保持与 face.html 的 canvas-container 一致
        const ch3Container = document.createElement('div');
        ch3Container.id = 'ch3-container';
        ch3Container.style.width = '100vw';
        ch3Container.style.height = '100vh';
        ch3Container.style.position = 'fixed';
        ch3Container.style.top = '0';
        ch3Container.style.left = '0';
        ch3Container.style.zIndex = '0';
        ch3Container.style.display = 'none';
        document.body.appendChild(ch3Container);
        this.chapter3 = new Chapter3Face(ch3Container);
        
        this.animate();
      }
      
      resize() {
        this.dpr = window.devicePixelRatio || 1;
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.style.width = this.width + 'px';
        this.canvas.style.height = this.height + 'px';
        this.canvas.width = this.width * this.dpr;
        this.canvas.height = this.height * this.dpr;
        this.ctx.scale(this.dpr, this.dpr);
      }
      
      animate() {
        requestAnimationFrame(() => this.animate());
        
        this.updateLogic();
        
        const cx = this.width / 2;
        const cy = this.height / 2;
        
        // 根据 narrativePhase 决定绘制内容
        if (STATE.narrativePhase === 'preface') {
          // preface 阶段：全黑背景，隐藏 Three.js canvas，显示 2D canvas
          this.canvas.style.display = 'block';
          this.chapter1Canvas.style.display = 'none';
          this.chapter2Canvas.style.display = 'none';
          this.chapter3.renderer.domElement.parentElement.style.display = 'none';
          this.ctx.fillStyle = '#000';
          this.ctx.fillRect(0, 0, this.width, this.height);
        } else if (STATE.narrativePhase === 'ch1') {
          // 第一章：使用 Three.js (点)
          this.canvas.style.display = 'none';
          this.chapter1Canvas.style.display = 'block';
          this.chapter2Canvas.style.display = 'none';
          this.chapter3.renderer.domElement.parentElement.style.display = 'none';
          this.chapter1.update();
          this.chapter1.render();
          return; // 跳过 2D 渲染和 UI 更新已在 updateLogic 中处理
        } else if (STATE.narrativePhase === 'ch2') {
          // 第二章：使用 Three.js (线)
          this.canvas.style.display = 'none';
          this.chapter1Canvas.style.display = 'none';
          this.chapter2Canvas.style.display = 'block';
          this.chapter3.renderer.domElement.parentElement.style.display = 'none';
          this.chapter2.update();
          this.chapter2.render();
          return;
        } else if (STATE.narrativePhase === 'ch3') {
          // 第三章：使用 Three.js (面)
          this.canvas.style.display = 'none';
          this.chapter1Canvas.style.display = 'none';
          this.chapter2Canvas.style.display = 'none';
          this.chapter3.renderer.domElement.parentElement.style.display = 'block';
          this.chapter3.update();
          this.chapter3.render();
          return;
        } else if (STATE.chapter >= 1 && STATE.chapter <= 3) {
          // 兼容旧逻辑
          this.canvas.style.display = 'block';
          this.chapter1Canvas.style.display = 'none';
          this.chapter2Canvas.style.display = 'none';
          this.chapter3.renderer.domElement.parentElement.style.display = 'none';
          this.ctx.fillStyle = '#000';
          this.ctx.fillRect(0, 0, this.width, this.height);
          switch (STATE.chapter) {
            case 1: 
              this.canvas.style.display = 'none';
              this.chapter1Canvas.style.display = 'block';
              this.chapter1.update();
              this.chapter1.render();
              return;
            case 2: drawChapter2(this.ctx, cx, cy, this.width, this.height); break;
            case 3: 
              this.canvas.style.display = 'none';
              this.chapter3.renderer.domElement.parentElement.style.display = 'block';
              this.chapter3.update();
              this.chapter3.render();
              return;
          }
        }
        
        // 绘制暗角效果
        drawVignette(this.ctx, this.width, this.height);
        
        this.updateUI();
      }
      
      updateLogic() {
        if (STATE.manualOverride) return;
        
        const hasMain = ctrl[0].connected;
        const hasSub = ctrl[1].connected;
        const maxE = Math.max(STATE.mainEnergy, STATE.subEnergy);
        const totalE = (STATE.mainEnergy + STATE.subEnergy) / 2;
        
        if (STATE.peakHold > 0) STATE.peakHold--;
        else { STATE.mainPeaked = false; STATE.subPeaked = false; }
        
        let target = 0;
        if (hasSub && STATE.mainPeaked && STATE.subPeaked && maxE > 70) {
          target = 1.0;
        } else if (maxE > 30) {
          target = 0.3 + (maxE / 100) * 0.4;
        }
        
        STATE.targetProgress = target;
        STATE.morphProgress += (STATE.targetProgress - STATE.morphProgress) * 0.04;
        STATE.wavePhase += 0.02;
        
        // 更新俯瞰系统
        flyoverSystem.update(totalE);
        
        // 更新文案系统（根据能量触发发展/高潮）
        if (STATE.narrativePhase.startsWith('ch')) {
          updateNarrativeByEnergy(totalE, hasSub);
        }
        
        // 第一章 Three.js 视觉系统的 ESP32 状态映射
        if (STATE.narrativePhase === 'ch1' && this.chapter1) {
          const mainE = STATE.mainEnergy;
          const subE = STATE.subEnergy;
          
          const motionThreshold = STATE.motionThreshold;
          const developThreshold = STATE.developThreshold;
          const climaxThreshold = STATE.climaxThreshold;
          
          const effectiveMainEnergy = mainE > motionThreshold ? mainE : 0;
          const effectiveSubEnergy = subE > motionThreshold ? subE : 0;
          const effectiveTotal = (effectiveMainEnergy + effectiveSubEnergy) / 2;
          
          let targetStage = 0;
          
          if (hasSub && effectiveTotal >= climaxThreshold) {
            targetStage = 3;
          } else if (hasMain && effectiveMainEnergy >= developThreshold) {
            targetStage = 2;
          } else if (hasMain && effectiveMainEnergy > 0) {
            targetStage = 1;
          }
          
          this.chapter1.setTargetStage(targetStage);
          
          // 更新调试显示
          const elEnergy = document.getElementById('debug-energy');
          const elStage = document.getElementById('debug-stage');
          if (elEnergy) elEnergy.textContent = Math.round(effectiveMainEnergy) + '/' + Math.round(effectiveSubEnergy);
          if (elStage) elStage.textContent = targetStage;
        }
        
        // 第二章 Three.js 视觉系统的 ESP32 状态映射
        if (STATE.narrativePhase === 'ch2' && this.chapter2) {
          const mainE = STATE.mainEnergy;
          const subE = STATE.subEnergy;
          
          const motionThreshold = STATE.motionThreshold;
          const developThreshold = STATE.developThreshold;
          const climaxThreshold = STATE.climaxThreshold;
          
          const effectiveMainEnergy = mainE > motionThreshold ? mainE : 0;
          const effectiveSubEnergy = subE > motionThreshold ? subE : 0;
          const effectiveTotal = (effectiveMainEnergy + effectiveSubEnergy) / 2;
          
          let targetStage = 0;
          
          if (hasSub && effectiveTotal >= climaxThreshold) {
            targetStage = 3;
          } else if (hasMain && effectiveMainEnergy >= developThreshold) {
            targetStage = 2;
          } else if (hasMain && effectiveMainEnergy > 0) {
            targetStage = 1;
          }
          
          this.chapter2.setTargetStage(targetStage);
          
          // 更新调试显示
          const elEnergy = document.getElementById('debug-energy');
          const elStage = document.getElementById('debug-stage');
          if (elEnergy) elEnergy.textContent = Math.round(effectiveMainEnergy) + '/' + Math.round(effectiveSubEnergy);
          if (elStage) elStage.textContent = targetStage;
        }
        
        // 第三章 Three.js 视觉系统的 ESP32 状态映射
        if (STATE.narrativePhase === 'ch3' && this.chapter3) {
          const mainE = STATE.mainEnergy;
          const subE = STATE.subEnergy;
          
          const motionThreshold = STATE.motionThreshold;
          const developThreshold = STATE.developThreshold;
          const climaxThreshold = STATE.climaxThreshold;
          
          const effectiveMainEnergy = mainE > motionThreshold ? mainE : 0;
          const effectiveSubEnergy = subE > motionThreshold ? subE : 0;
          const effectiveTotal = (effectiveMainEnergy + effectiveSubEnergy) / 2;
          
          let targetPhase = 1;
          
          if (hasSub && effectiveTotal >= climaxThreshold) {
            targetPhase = 4;
          } else if (hasMain && effectiveMainEnergy >= developThreshold) {
            targetPhase = 3;
          } else if (hasMain && effectiveMainEnergy > motionThreshold) {
            targetPhase = 2;
          } else if (hasMain) {
            targetPhase = 1;
          }
          
          this.chapter3.setPhase(targetPhase);
          
          // 更新调试显示
          const elEnergy = document.getElementById('debug-energy');
          const elStage = document.getElementById('debug-stage');
          if (elEnergy) elEnergy.textContent = Math.round(effectiveMainEnergy) + '/' + Math.round(effectiveSubEnergy);
          if (elStage) elStage.textContent = targetPhase;
        }
      }
      
      updateUI() {
        // 更新右下角能量条（能量范围0-10000，显示百分比）
        const elEnergy = document.getElementById('energy-fill');
        const elVal = document.getElementById('energy-value');
        const energyPercent = Math.min(100, (STATE.mainEnergy + STATE.subEnergy) / 200); // 20000 = 100%
        if (elEnergy) elEnergy.style.width = energyPercent + '%';
        if (elVal) elVal.textContent = Math.round((STATE.mainEnergy + STATE.subEnergy) / 2);
      }
    }
    
    // ═══════════════════════════════════════════════════
    // 传感器处理
    // ═══════════════════════════════════════════════════
    function detectPeak(velocity, isMain) {
      const prev = isMain ? STATE.prevMainVel : STATE.prevSubVel;
      if (velocity > prev * 1.1 && velocity > CONFIG.threshold) {
        if (isMain) STATE.mainPeaked = true;
        else STATE.subPeaked = true;
        STATE.peakHold = CONFIG.cooldown;
      }
      if (isMain) STATE.prevMainVel = velocity;
      else STATE.prevSubVel = velocity;
    }
    
    function updateEnergy(accMag, gyroMag, isMain) {
      const net = Math.max(0, accMag - 9.8);
      // 能量上限调整为10000，获得更广泛的可调节范围
      const instant = Math.min(10000, (net + gyroMag * 0.5) * 800);
      const buf = isMain ? STATE.mainBuf : STATE.subBuf;
      buf.push(instant);
      if (buf.length > CONFIG.smoothFrames) buf.shift();
      const energy = buf.reduce((a,b) => a+b, 0) / buf.length;
      if (isMain) STATE.mainEnergy = energy;
      else STATE.subEnergy = energy;
    }
    
    // ═══════════════════════════════════════════════════
    // BLE
    // ═══════════════════════════════════════════════════
    async function startBLE(idx) {
      if (!navigator.bluetooth) { alert('需要Chrome/Edge'); return; }
      
      const btn = document.getElementById(idx === 0 ? 'ble-main' : 'ble-sub');
      const c = ctrl[idx];
      
      if (c.connected) {
        try { if (c.bleDevice) c.bleDevice.gatt.disconnect(); } catch(e){}
        c.connected = false; c.bleDevice = null; c.bleChar = null;
        btn.textContent = idx === 0 ? '🔵 连接主手 ESP32' : '🔵 连接副手 ESP32';
        btn.classList.remove('connected');
        return;
      }
      
      btn.textContent = '扫描中...'; btn.disabled = true;
      
      try {
        c.bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: DEVICE_NAMES[idx] }],
          optionalServices: [SERVICE_UUID]
        });
        
        c.bleDevice.addEventListener('gattserverdisconnected', () => {
          c.connected = false; c.bleDevice = null; c.bleChar = null;
          btn.textContent = idx === 0 ? '🔵 连接主手 ESP32' : '🔵 连接副手 ESP32';
          btn.classList.remove('connected');
        });
        
        const server = await c.bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        c.bleChar = await service.getCharacteristic(CHAR_UUID);
        await c.bleChar.startNotifications();
        
        c.bleChar.addEventListener('characteristicvaluechanged', (e) => {
          try {
            const data = JSON.parse(new TextDecoder().decode(e.target.value));
            onSensorData(idx, data);
          } catch(_) {}
        });
        
        c.connected = true;
        btn.textContent = '🔵 已连接';
        btn.classList.add('connected');
        btn.disabled = false;
      } catch (e) {
        btn.textContent = idx === 0 ? '🔵 连接主手 ESP32' : '🔵 连接副手 ESP32';
        btn.disabled = false;
      }
    }
    
    function onSensorData(idx, data) {
      const isMain = idx === 0;
      let ax = 0, ay = 0, az = 0, gx = 0, gy = 0, gz = 0;
      if (data.ax !== undefined) {
        ax = +data.ax; ay = +data.ay; az = +data.az;
        gx = +data.gx; gy = +data.gy; gz = +data.gz;
      }
      const accMag = Math.sqrt(ax*ax + ay*ay + az*az);
      const gyroMag = Math.sqrt(gx*gx + gy*gy + gz*gz);
      detectPeak(accMag, isMain);
      updateEnergy(accMag, gyroMag, isMain);
    }
    
    // ═══════════════════════════════════════════════════
    // UI
    // ═══════════════════════════════════════════════════
    function setManualProgress(val) {
      STATE.morphProgress = val / 100;
      STATE.manualOverride = val > 0;
      const el = document.getElementById('val-manual');
      if (el) el.textContent = val + '%';
    }
    
    function setChapter(ch) {
      STATE.chapter = ch;
      STATE.morphProgress = 0;
      STATE.targetProgress = 0;
      [1,2,3].forEach(i => {
        const btn = document.getElementById('ch-' + i);
        if (btn) btn.classList.toggle('active', i === ch);
      });
    }
    
    function resetSystem() {
      STATE.morphProgress = 0;
      STATE.targetProgress = 0;
      STATE.mainEnergy = 0;
      STATE.subEnergy = 0;
      STATE.mainPeaked = false;
      STATE.subPeaked = false;
      STATE.mainBuf = [];
      STATE.subBuf = [];
    }
    
    // ═══════════════════════════════════════════════════
    // 开场 & 文案系统（状态驱动）
    // ═══════════════════════════════════════════════════
    
    function startIntro() {
      const introOverlay = document.getElementById('intro-overlay');
      const mainTitle = introOverlay.querySelector('.intro-main');
      const subTitle = introOverlay.querySelector('.intro-sub');
      
      // 显示主标题
      setTimeout(() => mainTitle.classList.add('visible'), 500);
      // 显示副标题
      setTimeout(() => subTitle.classList.add('visible'), 1500);
      
      // 5秒后淡出开场，进入preface
      setTimeout(() => {
        introOverlay.classList.add('hidden');
        enterPhase('preface');
      }, 5000);
    }
    
    function enterPhase(phase) {
      STATE.narrativePhase = phase;
      STATE.narrativeSubPhase = '';
      STATE.showChapterTitle = false;
      
      const overlay = document.getElementById('narrative-overlay');
      const cnEl = overlay.querySelector('.narrative-cn');
      const enEl = overlay.querySelector('.narrative-en');
      const config = CHAPTER_CONFIG[phase];
      
      // 更新章节按钮
      document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
      
      if (phase === 'preface') {
        // 开场前：全黑背景，显示引导文字
        cnEl.textContent = config.text.cn;
        enEl.textContent = config.text.en;
        overlay.classList.add('visible');
        
        // 5秒后自动进入第一章
        setTimeout(() => {
          overlay.classList.remove('visible');
          setTimeout(() => enterChapter('ch1'), 800);
        }, 5000);
        
      } else if (phase === 'ending') {
        // 结尾
        cnEl.textContent = config.text.cn;
        enEl.textContent = config.text.en;
        overlay.classList.add('visible');
        document.getElementById('ch-4').classList.add('active');
        updatePhaseIndicator('螺旋 · 回归·自我');
        
      } else {
        // 章节切换（手动）
        enterChapter(phase);
      }
    }
    
    function enterChapter(chapter) {
      STATE.narrativePhase = chapter;
      STATE.narrativeSubPhase = '';
      STATE.showChapterTitle = true;
      
      // 重置文案触发状态（进入新章节时重置）
      STATE.narrativeTriggered = { developing: false, climax: false };
      if (STATE.narrativeTimer) {
        clearTimeout(STATE.narrativeTimer);
        STATE.narrativeTimer = null;
      }
      
      const config = CHAPTER_CONFIG[chapter];
      const overlay = document.getElementById('narrative-overlay');
      
      // 隐藏中央文案
      overlay.classList.remove('visible');
      
      // 更新顶部标题
      updatePhaseIndicator(config.title + ' · ' + config.subtitle);
      
      // 更新按钮状态
      const btnMap = { 'ch1': 'ch-1', 'ch2': 'ch-2', 'ch3': 'ch-3', 'ch4': 'ch-4' };
      const btnId = btnMap[chapter];
      if (btnId) document.getElementById(btnId).classList.add('active');
    }
    
    function updateNarrativeByEnergy(energy, hasSub) {
      // 根据能量状态更新文案（发展/高潮）- 每个阶段只触发一次，显示5秒
      const phase = STATE.narrativePhase;
      if (!CHAPTER_CONFIG[phase]) return;
      
      const config = CHAPTER_CONFIG[phase];
      const overlay = document.getElementById('narrative-overlay');
      const cnEl = overlay.querySelector('.narrative-cn');
      const enEl = overlay.querySelector('.narrative-en');
      
      // 确定子阶段（能量范围0-10000：单手>4000发展部, 双手总和>7500高潮）
      let newSubPhase = '';
      const isChapter1 = STATE.narrativePhase === 'ch1';
      
      if (isChapter1) {
        // 第一章：点 的特殊阈值（与视觉阈值保持一致）
        const totalE = (STATE.mainEnergy + STATE.subEnergy) / 2;
        if (STATE.mainEnergy > 4000 && totalE < 7500) {
          newSubPhase = 'developing';
        } else if (hasSub && totalE >= 7500) {
          newSubPhase = 'climax';
        }
      } else {
        // 其他章节保持原阈值（能量范围0-10000）
        if (energy > 3000 && energy < 7500) {
          newSubPhase = 'developing';
        } else if (energy >= 7500) {
          newSubPhase = 'climax';
        }
      }
      
      // 只处理进入新阶段的情况，且该阶段未触发过
      if (newSubPhase !== STATE.narrativeSubPhase) {
        STATE.narrativeSubPhase = newSubPhase;
        
        // 清除之前的定时器
        if (STATE.narrativeTimer) {
          clearTimeout(STATE.narrativeTimer);
          STATE.narrativeTimer = null;
        }
        
        if (newSubPhase === 'developing' && config.textDeveloping && !STATE.narrativeTriggered.developing) {
          // 第一次进入发展部，显示文案
          STATE.narrativeTriggered.developing = true;
          cnEl.textContent = config.textDeveloping.cn;
          enEl.textContent = config.textDeveloping.en;
          overlay.classList.add('visible');
          
          // 5秒后自动隐藏
          STATE.narrativeTimer = setTimeout(() => {
            overlay.classList.remove('visible');
          }, 5000);
          
        } else if (newSubPhase === 'climax' && config.textClimax && !STATE.narrativeTriggered.climax) {
          // 第一次进入高潮，显示文案
          STATE.narrativeTriggered.climax = true;
          cnEl.textContent = config.textClimax.cn;
          enEl.textContent = config.textClimax.en;
          overlay.classList.add('visible');
          
          // 5秒后自动隐藏
          STATE.narrativeTimer = setTimeout(() => {
            overlay.classList.remove('visible');
          }, 5000);
          
        } else if (!newSubPhase) {
          // 回到空闲状态，立即隐藏
          overlay.classList.remove('visible');
        }
        // 其他情况（已触发过或没有文案）不做任何操作
      }
    }
    
    function updatePhaseIndicator(text) {
      const indicator = document.getElementById('phase-indicator');
      if (indicator) indicator.textContent = text;
    }
    
    function jumpToChapter(chapter) {
      // 手动切换章节
      document.getElementById('intro-overlay').classList.add('hidden');
      document.getElementById('narrative-overlay').classList.remove('visible');
      enterChapter(chapter);
    }
    
    function toggleMenu() {
      const menu = document.getElementById('side-menu');
      if (menu) menu.classList.toggle('open');
    }
    
    // 启动
    new VisualEngine();
    startIntro();
  </script>
</body>
