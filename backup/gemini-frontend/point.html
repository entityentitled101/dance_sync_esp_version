<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点线变形 - 视觉 Playground</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* 纯黑背景 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI 界面层 */
        #ui-layer {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none; /* 让鼠标事件穿透到下方的 Canvas */
        }

        .title-box {
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .title-box h1 {
            font-size: 1.2rem;
            font-weight: 300;
            margin: 0 0 5px 0;
        }

        .title-box p {
            font-size: 0.8rem;
            color: #888;
            margin: 0;
        }

        .controls {
            display: flex;
            gap: 15px;
            pointer-events: auto; /* 按钮恢复鼠标交互 */
            background: rgba(20, 20, 20, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        button:hover {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
        }

        button.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
    </style>
    <!-- 引入 Three.js 核心库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="title-box">
            <h1>形态演变 Playground</h1>
            <p>点 / 线 / 面的交响律动</p>
        </div>
        <div class="controls">
            <button id="btn-1" class="active" onclick="setStage(1)">I. 原初 (点)</button>
            <button id="btn-2" onclick="setStage(2)">II. 发展 (流转)</button>
            <button id="btn-3" onclick="setStage(3)">III. 高潮 (炸裂)</button>
        </div>
    </div>

    <script>
        // --- 1. 基础场景设置 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000); // 纯黑背景
        // 添加一点雾化效果，让远处的线框稍微暗一些，增加空间深度
        scene.fog = new THREE.FogExp2(0x000000, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // --- 2. 几何体与材质构建 ---
        // 使用二十面体来生成均匀的球体网格
        // 半径2，细分度16（产生足够的顶点用来做形变和炸裂）
        const geometry = new THREE.IcosahedronGeometry(2, 16); 
        
        // 线框材质 (线)
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.15
        });

        // 顶点材质 (点)
        const pointsMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.04,
            transparent: true,
            opacity: 0.8
        });

        // 将几何体既渲染为线框，又渲染为点，呼应"点线面"概念
        const wireframeMesh = new THREE.Mesh(geometry, wireframeMaterial);
        const pointsMesh = new THREE.Points(geometry, pointsMaterial);
        
        // 创建一个组来统一管理它们
        const shapeGroup = new THREE.Group();
        shapeGroup.add(wireframeMesh);
        shapeGroup.add(pointsMesh);
        scene.add(shapeGroup);

        // --- 2.5 创建高潮阶段的星环与光子 ---
        // 星环组
        const ringsGroup = new THREE.Group();
        const rings = [];
        for (let i = 0; i < 4; i++) {
            // 使用椭圆曲线生成平滑圆环
            const curve = new THREE.EllipseCurve(0, 0, 3 + i * 0.6, 3 + i * 0.6, 0, 2 * Math.PI, false, 0);
            const pts = curve.getPoints(100);
            const rGeo = new THREE.BufferGeometry().setFromPoints(pts);
            const rMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
            const rLine = new THREE.LineLoop(rGeo, rMat);
            
            // 随机初始旋转角度
            rLine.rotation.x = Math.random() * Math.PI;
            rLine.rotation.y = Math.random() * Math.PI;
            
            // 保存各自的旋转速度
            rLine.userData = {
                speedX: (Math.random() - 0.5) * 0.01,
                speedY: (Math.random() - 0.5) * 0.01,
                speedZ: (Math.random() - 0.5) * 0.01,
                material: rMat
            };
            rings.push(rLine);
            ringsGroup.add(rLine);
        }
        scene.add(ringsGroup);

        // 光子粒子系统
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleBaseDirs = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            // 球面随机分布向量
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            const sinPhi = Math.sin(phi);
            const x = sinPhi * Math.cos(theta);
            const y = sinPhi * Math.sin(theta);
            const z = Math.cos(phi);
            
            particleBaseDirs[i*3] = x;
            particleBaseDirs[i*3+1] = y;
            particleBaseDirs[i*3+2] = z;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        // 使用加色混合让光子看起来更亮
        const particleMat = new THREE.PointsMaterial({
            color: 0xffffff, 
            size: 0.06, 
            transparent: true, 
            opacity: 0,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const particlesObj = new THREE.Points(particleGeo, particleMat);
        scene.add(particlesObj);

        // --- 3. 提取顶点数据用于动画变形 ---
        const positionAttribute = geometry.attributes.position;
        const vertexCount = positionAttribute.count;
        
        // 保存最原始的归一化位置信息，作为变形的基准
        const basePositions = new Float32Array(vertexCount * 3);

        for (let i = 0; i < vertexCount; i++) {
            const x = positionAttribute.getX(i);
            const y = positionAttribute.getY(i);
            const z = positionAttribute.getZ(i);
            
            // 归一化处理（计算每个点距离中心的距离，使其变成一个纯粹的单位向量）
            const length = Math.sqrt(x*x + y*y + z*z);
            basePositions[i*3] = x / length;
            basePositions[i*3+1] = y / length;
            basePositions[i*3+2] = z / length;
        }

        // --- 4. 状态机与平滑插值逻辑 ---
        let currentStage = 1;
        
        // 当前应用的实时参数
        const currentParams = {
            scale: 0.1,        // 整体缩放大小
            noiseAmount: 0.0,  // 流体波动的强度
            rotationSpeed: 0.002, // 整体自转速度
            ringAlpha: 0.0,    // 星环的透明度
            ringScale: 0.1,    // 星环的缩放
            particleAlpha: 0.0,// 光子的透明度
            particleSpread: 0.0 // 光子的扩散范围
        };

        // 目标状态的参数字典（类似于乐章的定义）
        const stageTargets = {
            // 第一阶段：极小的原初点，静谧
            1: { scale: 0.15, noiseAmount: 0.01, rotationSpeed: 0.001, ringAlpha: 0.0, ringScale: 0.5, particleAlpha: 0.0, particleSpread: 0.0 },
            // 第二阶段：放大，流体般的发展部
            2: { scale: 1.5,  noiseAmount: 0.35, rotationSpeed: 0.006, ringAlpha: 0.0, ringScale: 0.8, particleAlpha: 0.0, particleSpread: 0.0 },
            // 第三阶段：高潮，剥离毛刺，展现精致的星环与炸裂光子
            3: { scale: 1.1,  noiseAmount: 0.15, rotationSpeed: 0.015, ringAlpha: 0.3, ringScale: 1.2, particleAlpha: 0.8, particleSpread: 5.0 }
        };

        // UI 点击切换事件
        window.setStage = function(stage) {
            currentStage = stage;
            
            // 更新 UI 按钮样式
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + stage).classList.add('active');
        };

        // 鼠标交互控制
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        
        window.addEventListener('mousemove', (e) => {
            // 转换为 -1 到 1 的标准化设备坐标
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // --- 5. 核心渲染与动画循环 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 1. 平滑插值 (Lerp) 当前参数趋向目标参数
            // 这里的 0.03 控制了切换阶段时过渡的“粘滞感”和流畅度
            const target = stageTargets[currentStage];
            const lerpSpeed = 0.03; 
            currentParams.scale += (target.scale - currentParams.scale) * lerpSpeed;
            currentParams.noiseAmount += (target.noiseAmount - currentParams.noiseAmount) * lerpSpeed;
            currentParams.rotationSpeed += (target.rotationSpeed - currentParams.rotationSpeed) * lerpSpeed;
            currentParams.ringAlpha += (target.ringAlpha - currentParams.ringAlpha) * lerpSpeed;
            currentParams.ringScale += (target.ringScale - currentParams.ringScale) * lerpSpeed;
            currentParams.particleAlpha += (target.particleAlpha - currentParams.particleAlpha) * lerpSpeed;
            currentParams.particleSpread += (target.particleSpread - currentParams.particleSpread) * lerpSpeed;

            // 2. 遍历并更新每一个顶点 (主体球)
            for (let i = 0; i < vertexCount; i++) {
                // 获取基准的单位法向量
                const nx = basePositions[i*3];
                const ny = basePositions[i*3+1];
                const nz = basePositions[i*3+2];

                // 计算 3D 空间中的伪随机噪声 (类似水波流转)
                // 通过两个不同频率的波叠加，产生更有机的流体感
                const noise1 = Math.sin(nx * 3 + time * 1.5) * Math.cos(ny * 3 + time * 1.5) * Math.sin(nz * 3 + time * 1.5);
                const noise2 = Math.sin(nx * 8 - time) * Math.cos(ny * 8 - time) * 0.5;
                const totalNoise = noise1 + noise2;

                // 计算形变偏移量
                const offset = currentParams.noiseAmount * totalNoise;

                // 计算最终缩放：基础半径 * 动态缩放 * (1 + 偏移量)
                const finalRadius = 2.0 * currentParams.scale * (1.0 + offset);

                // 更新顶点位置
                positionAttribute.setXYZ(i, nx * finalRadius, ny * finalRadius, nz * finalRadius);
            }

            // 标记顶点已经更新，通知显卡重新渲染
            positionAttribute.needsUpdate = true;
            
            // 2.5 更新星环
            ringsGroup.scale.set(currentParams.ringScale, currentParams.ringScale, currentParams.ringScale);
            rings.forEach(ring => {
                ring.userData.material.opacity = currentParams.ringAlpha;
                // 让星环各自按不同速度旋转
                ring.rotation.x += ring.userData.speedX;
                ring.rotation.y += ring.userData.speedY;
                ring.rotation.z += ring.userData.speedZ;
            });
            
            // 2.6 更新光子粒子
            particleMat.opacity = currentParams.particleAlpha;
            // 当粒子透明度极低时，不浪费性能去计算位置
            if (currentParams.particleAlpha > 0.01) {
                const pPositions = particleGeo.attributes.position.array;
                const baseRad = 2.0 * currentParams.scale;
                
                for (let i = 0; i < particleCount; i++) {
                    const dirX = particleBaseDirs[i*3];
                    const dirY = particleBaseDirs[i*3+1];
                    const dirZ = particleBaseDirs[i*3+2];
                    
                    // 光子的有机运动：基础半径 + 扩散范围 * 随机脉冲
                    // i % 100 用来错开脉冲相位
                    const pulse = (Math.sin(time * 2 + i) * 0.5 + 0.5); 
                    const dist = baseRad + currentParams.particleSpread * pulse;
                    
                    pPositions[i*3] = dirX * dist;
                    pPositions[i*3+1] = dirY * dist;
                    pPositions[i*3+2] = dirZ * dist;
                }
                particleGeo.attributes.position.needsUpdate = true;
                
                // 让整个光子场也带有一点缓慢自转
                particlesObj.rotation.y += currentParams.rotationSpeed * 0.2;
                particlesObj.rotation.x += currentParams.rotationSpeed * 0.1;
            }

            // 3. 整体旋转动画
            // 基础自转
            shapeGroup.rotation.y += currentParams.rotationSpeed;
            shapeGroup.rotation.z += currentParams.rotationSpeed * 0.5;

            // 鼠标跟随造成的倾斜
            targetRotationX = mouseY * 0.5;
            targetRotationY = mouseX * 0.5;
            shapeGroup.rotation.x += (targetRotationX - shapeGroup.rotation.x) * 0.05;
            // (注意 y 轴同时包含了自转和鼠标偏转)

            renderer.render(scene, camera);
        }

        // --- 6. 响应窗口调整 ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 启动动画
        window.onload = function() {
            animate();
        };

    </script>
</body>
</html>
