<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>声·命体 —— 原型 v2</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }
    
    #visual-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    /* 汉堡菜单按钮 */
    #menu-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: rgba(10, 10, 10, 0.9);
      border: 1px solid #444;
      border-radius: 8px;
      cursor: pointer;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.3s;
    }
    
    #menu-btn:hover {
      border-color: #888;
    }
    
    #menu-btn span {
      display: block;
      width: 18px;
      height: 1.5px;
      background: #888;
      transition: all 0.3s;
    }
    
    #menu-btn.open span:nth-child(1) {
      transform: translateY(6.5px) rotate(45deg);
      background: #fff;
    }
    
    #menu-btn.open span:nth-child(2) {
      opacity: 0;
    }
    
    #menu-btn.open span:nth-child(3) {
      transform: translateY(-6.5px) rotate(-45deg);
      background: #fff;
    }
    
    /* 侧边菜单 */
    #side-menu {
      position: fixed;
      bottom: 70px;
      left: 20px;
      width: 280px;
      max-height: calc(100vh - 100px);
      background: rgba(8, 8, 8, 0.98);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      z-index: 199;
      overflow-y: auto;
      transform: scale(0.9) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
    }
    
    #side-menu.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    
    #side-menu::-webkit-scrollbar {
      width: 4px;
    }
    
    #side-menu::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px;
    }
    
    .menu-section {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }
    
    .menu-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }
    
    .section-title {
      font-size: 9px;
      letter-spacing: 2px;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    .slider-row label {
      font-size: 10px;
      color: #888;
      min-width: 70px;
    }
    
    .slider-row input[type="range"] {
      flex: 1;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
      -webkit-appearance: none;
    }
    
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .slider-row .value {
      font-size: 10px;
      color: #fff;
      min-width: 36px;
      text-align: right;
      font-family: 'Menlo', monospace;
    }
    
    /* 主控制面板 */
    #control-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(10, 10, 10, 0.95);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 14px 18px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 220px;
    }
    
    .panel-header {
      font-size: 10px;
      letter-spacing: 3px;
      color: #666;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }
    
    #audio-btn {
      width: 100%;
      padding: 10px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid #444;
      background: transparent;
      color: #666;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    #audio-btn:hover {
      border-color: #888;
      color: #aaa;
    }
    
    #audio-btn.ready {
      border-color: #fff;
      color: #fff;
    }
    
    .energy-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 9px;
      color: #666;
    }
    
    .energy-track {
      flex: 1;
      height: 3px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    
    .energy-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.05s;
    }
    
    .touch-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
    }
    
    .touch-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid #333;
      background: transparent;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      color: #444;
    }
    
    .touch-dot.active {
      background: #fff;
      border-color: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
      color: #000;
    }
    
    .conn-btn {
      padding: 8px 12px;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid #444;
      background: transparent;
      color: #666;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .conn-btn:hover {
      border-color: #888;
      color: #aaa;
    }
    
    .conn-btn.connected {
      border-color: #fff;
      color: #fff;
      background: rgba(255,255,255,0.1);
    }
    
    .conn-row {
      display: flex;
      gap: 6px;
    }
    
    .status-text {
      font-size: 9px;
      color: #444;
      font-family: 'Menlo', monospace;
    }
    
    /* 点击外部关闭菜单的遮罩 */
    #menu-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 150;
      display: none;
    }
    
    #menu-overlay.open {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="visual-canvas"></canvas>
  
  <!-- 菜单遮罩 -->
  <div id="menu-overlay" onclick="toggleMenu()"></div>
  
  <!-- 汉堡菜单按钮 -->
  <button id="menu-btn" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>
  
  <!-- 侧边设置菜单 -->
  <div id="side-menu">
    <div class="menu-section">
      <div class="section-title">线条模式</div>
      <div class="slider-row">
        <label>叙事阶段</label>
        <select id="line-mode" onchange="updateParam('lineMode', this.value)" style="flex:1;background:#111;color:#fff;border:1px solid #333;padding:4px;font-size:10px;">
          <option value="0">1. 水平正弦波</option>
          <option value="1">2. Joy Division山脉</option>
          <option value="2">3. 拓扑圆环</option>
          <option value="3">4. 利萨茹扭动</option>
          <option value="4">5. 螺旋银河</option>
          <option value="5">6. 心电图</option>
        </select>
      </div>
      <div class="slider-row">
        <label>线条大小</label>
        <input type="range" id="line-size" min="50" max="400" step="10" value="180" oninput="updateParam('lineSize', this.value)">
        <span class="value" id="val-line-size">180</span>
      </div>
      <div class="slider-row">
        <label>线条粗细</label>
        <input type="range" id="line-thick" min="0.1" max="5" step="0.1" value="0.3" oninput="updateParam('lineThickness', this.value)">
        <span class="value" id="val-line-thick">0.3</span>
      </div>
      <div class="slider-row">
        <label>拖尾长度</label>
        <input type="range" id="trail" min="0.01" max="0.5" step="0.01" value="0.15" oninput="updateParam('trailAlpha', this.value)">
        <span class="value" id="val-trail">0.15</span>
      </div>
      <div class="slider-row">
        <label>发光强度</label>
        <input type="range" id="glow" min="0" max="50" step="1" value="15" oninput="updateParam('glowSize', this.value)">
        <span class="value" id="val-glow">15</span>
      </div>
      <div class="slider-row">
        <label>变形强度</label>
        <input type="range" id="distort" min="0" max="10" step="0.5" value="3" oninput="updateParam('distort', this.value)">
        <span class="value" id="val-distort">3</span>
      </div>
      <div class="slider-row">
        <label>运动速度</label>
        <input type="range" id="line-speed" min="0.1" max="3" step="0.1" value="1" oninput="updateParam('lineSpeed', this.value)">
        <span class="value" id="val-line-speed">1.0</span>
      </div>
    </div>
    
    <div class="menu-section">
      <div class="section-title">舞者参数</div>
      <div class="slider-row">
        <label>活动范围</label>
        <input type="range" id="dancer-range" min="50" max="400" step="10" value="200" oninput="updateParam('dancerRange', this.value)">
        <span class="value" id="val-dancer-range">200</span>
      </div>
      <div class="slider-row">
        <label>移动速度</label>
        <input type="range" id="dancer-speed" min="0.1" max="2" step="0.1" value="0.5" oninput="updateParam('dancerSpeed', this.value)">
        <span class="value" id="val-dancer-speed">0.5</span>
      </div>
      <div class="slider-row">
        <label>舞者数量</label>
        <input type="range" id="dancer-count" min="4" max="16" step="1" value="8" oninput="updateParam('dancerCount', this.value)">
        <span class="value" id="val-dancer-count">8</span>
      </div>
    </div>
    
    <div class="menu-section">
      <div class="section-title">音频参数</div>
      <div class="slider-row">
        <label>基础频率</label>
        <input type="range" id="base-freq" min="20" max="200" step="5" value="55" oninput="updateParam('baseFreq', this.value)">
        <span class="value" id="val-base-freq">55</span>
      </div>
      <div class="slider-row">
        <label>频率范围</label>
        <input type="range" id="freq-range" min="0" max="500" step="10" value="100" oninput="updateParam('freqRange', this.value)">
        <span class="value" id="val-freq-range">100</span>
      </div>
      <div class="slider-row">
        <label>噪声强度</label>
        <input type="range" id="noise-amp" min="0" max="1" step="0.05" value="0.3" oninput="updateParam('noiseAmp', this.value)">
        <span class="value" id="val-noise-amp">0.30</span>
      </div>
    </div>
    
    <div class="menu-section">
      <div class="section-title">传感器灵敏度</div>
      <div class="slider-row">
        <label>球形装置</label>
        <input type="range" id="sens-sphere" min="0.1" max="3" step="0.1" value="1" oninput="updateParam('sensSphere', this.value)">
        <span class="value" id="val-sens-sphere">1.0</span>
      </div>
    </div>
  </div>
  
  <!-- 主控制面板 -->
  <div id="control-panel">
    <div class="panel-header">声·命体 v2</div>
    
    <button id="audio-btn" onclick="initAudio()">🔊 启动音频引擎</button>
    
    <div class="energy-bar">
      <span>ENERGY</span>
      <div class="energy-track">
        <div class="energy-fill" id="energy-fill"></div>
      </div>
      <span id="energy-value">0</span>
    </div>
    
    <div class="touch-grid" id="touch-grid">
      <div class="touch-dot" id="touch-0">0</div>
      <div class="touch-dot" id="touch-1">1</div>
      <div class="touch-dot" id="touch-2">2</div>
      <div class="touch-dot" id="touch-3">3</div>
      <div class="touch-dot" id="touch-4">4</div>
      <div class="touch-dot" id="touch-5">5</div>
      <div class="touch-dot" id="touch-6">6</div>
      <div class="touch-dot" id="touch-7">7</div>
      <div class="touch-dot" id="touch-8">8</div>
      <div class="touch-dot" id="touch-9">9</div>
    </div>
    
    <div class="conn-row">
      <button class="conn-btn" id="ble-0" onclick="startBLE(0)">🔵 球形装置</button>
      <button class="conn-btn" id="ble-1" onclick="startBLE(1)">🔵 舞者传感器</button>
    </div>
    
    <div class="status-text">
      <span>球红外: <span id="sphere-ir">-</span></span> | 
      <span>舞者: <span id="dancer-ir">-</span></span>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // 配置参数（所有可调参数）
    // ═══════════════════════════════════════════════════
    const params = {
      // 视觉 - 线条
      lineMode: 0,        // 0=拓扑球,1=利萨茹,2=螺旋,3=噪波,4=多环
      lineSize: 180,      // 线条整体大小
      lineThickness: 0.3,
      lineSpeed: 1,       // 运动速度倍率
      trailAlpha: 0.15,
      glowSize: 15,
      distort: 3,
      // 舞者
      dancerRange: 200,
      dancerSpeed: 0.5,
      dancerCount: 8,
      // 音频
      baseFreq: 55,
      freqRange: 100,
      noiseAmp: 0.3,
      // 传感器
      sensSphere: 1,
      sensDancer: 0.5
    };
    
    // 噪声函数（用于噪波模式）
    function noise(x, y, z) {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
      return (Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453) % 1;
    }
    
    function updateParam(key, value) {
      params[key] = parseFloat(value);
      document.getElementById('val-' + key.replace(/[A-Z]/g, m => '-' + m.toLowerCase())).textContent = parseFloat(value).toFixed(2);
    }
    
    function toggleMenu() {
      const btn = document.getElementById('menu-btn');
      const menu = document.getElementById('side-menu');
      const overlay = document.getElementById('menu-overlay');
      const isOpen = btn.classList.toggle('open');
      menu.classList.toggle('open', isOpen);
      overlay.classList.toggle('open', isOpen);
    }
    
    // ═══════════════════════════════════════════════════
    // BLE 配置
    // ═══════════════════════════════════════════════════
    const SERVICE_UUID = '19b10000-e8f2-537e-4f6c-d104768a1214';
    const CHAR_UUID = '03504231-c554-43a4-b711-0b2945565834';
    const DEVICE_NAMES = ['ESP32', 'ESP32-mini'];
    
    const ctrl = [
      { bleDevice: null, bleChar: null, connected: false, role: 'sphere', vBuf: [] },
      { bleDevice: null, bleChar: null, connected: false, role: 'dancer', vBuf: [] },
    ];
    
    let audioReady = false;
    let sensorData = {
      touchPoints: new Array(10).fill(false),
      sphereIR: [135, 135, 135],
      dancerIR: [135, 135, 135, 135],
      totalEnergy: 0
    };
    
    let masterGain, limiter, reverb;
    let droneSynth, noiseSynth;
    let droneGain, noiseGain;
    
    async function initAudio() {
      if (audioReady) return;
      try {
        await Tone.start();
        limiter = new Tone.Limiter(-2).toDestination();
        masterGain = new Tone.Gain(0.8).connect(limiter);
        reverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).connect(masterGain);
        
        droneGain = new Tone.Gain(0).connect(reverb);
        droneSynth = new Tone.FatOscillator({
          type: 'sawtooth',
          frequency: params.baseFreq,
          spread: 30,
          count: 3
        }).start().connect(droneGain);
        
        noiseGain = new Tone.Gain(0).connect(masterGain);
        noiseSynth = new Tone.Noise('pink').start();
        const noiseFilter = new Tone.Filter(800, 'lowpass');
        noiseSynth.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        
        audioReady = true;
        document.getElementById('audio-btn').textContent = '🔊 音频就绪';
        document.getElementById('audio-btn').classList.add('ready');
      } catch (e) {
        console.error(e);
      }
    }
    
    // ═══════════════════════════════════════════════════
    // BLE 连接
    // ═══════════════════════════════════════════════════
    async function startBLE(idx) {
      if (!navigator.bluetooth) { alert('需要 Chrome/Edge'); return; }
      if (!audioReady) await initAudio();
      
      const btn = document.getElementById('ble-' + idx);
      const c = ctrl[idx];
      
      if (c.connected) {
        try { await c.bleDevice.gatt.disconnect(); } catch(e){}
        c.connected = false;
        btn.textContent = idx === 0 ? '🔵 球形装置' : '🔵 舞者传感器';
        btn.classList.remove('connected');
        return;
      }
      
      btn.textContent = '扫描中...';
      btn.disabled = true;
      
      try {
        c.bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: DEVICE_NAMES[idx] }],
          optionalServices: [SERVICE_UUID]
        });
        
        c.bleDevice.addEventListener('gattserverdisconnected', () => {
          c.connected = false;
          btn.textContent = idx === 0 ? '🔵 球形装置' : '🔵 舞者传感器';
          btn.classList.remove('connected');
        });
        
        const server = await c.bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        c.bleChar = await service.getCharacteristic(CHAR_UUID);
        await c.bleChar.startNotifications();
        
        c.bleChar.addEventListener('characteristicvaluechanged', (e) => {
          try { onSensorData(idx, JSON.parse(new TextDecoder().decode(e.target.value))); } catch(_) {}
        });
        
        c.connected = true;
        btn.textContent = '🔵 已连接';
        btn.classList.add('connected');
        btn.disabled = false;
        
      } catch (e) {
        btn.textContent = idx === 0 ? '🔵 球形装置' : '🔵 舞者传感器';
        btn.disabled = false;
      }
    }
    
    function onSensorData(idx, json) {
      const data = parseSensor(json);
      processSensorData(idx, data);
    }
    
    function parseSensor(json) {
      if (json.ax !== undefined) {
        return { ax: +json.ax||0, ay: +json.ay||0, az: +json.az||0, gx: +json.gx||0, gy: +json.gy||0, gz: +json.gz||0 };
      }
      const a = json.acceleration || {}, g = json.gyro || {};
      return { ax: +a.x||0, ay: +a.y||0, az: +a.z||0, gx: +g.x||0, gy: +g.y||0, gz: +g.z||0 };
    }
    
    let lastSensorTime = 0;
    function processSensorData(idx, data) {
      lastSensorTime = Date.now();
      const sens = idx === 0 ? params.sensSphere : params.sensDancer;
      const { ax, ay, az, gx, gy, gz } = data;
      const sax = ax * sens, say = ay * sens, saz = az * sens;
      const sgx = gx * sens, sgy = gy * sens, sgz = gz * sens;
      
      const accMag = Math.sqrt(sax*sax + say*say + saz*saz);
      const gyroMag = Math.sqrt(sgx*sgx + sgy*sgy + sgz*sgz);
      
      const c = ctrl[idx];
      c.vBuf.push(accMag);
      if (c.vBuf.length > 15) c.vBuf.shift();
      const smoothEnergy = c.vBuf.reduce((a,b)=>a+b,0)/c.vBuf.length;
      
      if (idx === 0) {
        sensorData.sphereIR[0] = Math.min(270, Math.max(0, 135 + sgx * 12));
        sensorData.sphereIR[1] = Math.min(270, Math.max(0, 135 + sgy * 15));
        sensorData.sphereIR[2] = Math.min(270, Math.max(0, 135 - saz * 8));
        
        const activity = Math.min(1, smoothEnergy / 8);
        for (let i = 0; i < 10; i++) {
          const thresh = 0.92 - activity * 0.55;
          const timeWobble = Math.sin(Date.now() / 180 + i * 0.7) * 0.15;
          sensorData.touchPoints[i] = Math.random() > (thresh + timeWobble);
        }
      }
      
      const instantEnergy = Math.min(100, (accMag + gyroMag * 0.4) * 4);
      sensorData.totalEnergy = sensorData.totalEnergy * 0.85 + instantEnergy * 0.15;
      
      updateUI();
      
      if (audioReady) {
        const normE = sensorData.totalEnergy / 100;
        droneGain.gain.rampTo(normE * 0.5, 0.1);
        noiseGain.gain.rampTo(normE * normE * params.noiseAmp, 0.1);
        const targetFreq = params.baseFreq + normE * params.freqRange;
        droneSynth.frequency.rampTo(targetFreq, 0.1);
      }
      
      if (window.visualEngine) {
        window.visualEngine.updateSensorData({
          ax: sax, ay: say, az: saz, gx: sgx, gy: sgy, gz: sgz,
          energy: sensorData.totalEnergy,
          touchPoints: sensorData.touchPoints,
          sphereIR: sensorData.sphereIR
        });
      }
    }
    
    function updateUI() {
      document.getElementById('energy-fill').style.width = sensorData.totalEnergy + '%';
      document.getElementById('energy-value').textContent = Math.round(sensorData.totalEnergy);
      for (let i = 0; i < 10; i++) {
        const el = document.getElementById('touch-' + i);
        if (el) el.classList.toggle('active', sensorData.touchPoints[i]);
      }
      document.getElementById('sphere-ir').textContent = sensorData.sphereIR.map(v => Math.round(v)).join(',');
    }
    
    // ═══════════════════════════════════════════════════
    // 舞者系统（大范围游走）
    // ═══════════════════════════════════════════════════
    class DancerSystem {
      constructor() {
        this.dancers = [];
        this.time = 0;
        this.initDancers();
      }
      
      initDancers() {
        this.dancers = [];
        const count = Math.floor(params.dancerCount);
        for (let i = 0; i < count; i++) {
          this.dancers.push({
            id: i,
            hasIR: (i % 2 === 0),
            x: 0, y: 0,
            angle: (i / count) * Math.PI * 2,
            radiusPhase: Math.random() * Math.PI * 2,
            speedPhase: Math.random() * Math.PI * 2,
            wanderX: 0, wanderY: 0
          });
        }
      }
      
      update(dt) {
        this.time += dt;
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const range = params.dancerRange;
        const speed = params.dancerSpeed;
        
        this.dancers.forEach(d => {
          // 大范围圆周运动 + 径向波动
          const radiusVar = Math.sin(this.time * speed * 0.5 + d.radiusPhase) * (range * 0.4);
          const currentRadius = range + radiusVar;
          
          // 角度变化（缓慢旋转 + 个人波动）
          d.angle += (speed * 0.02) + Math.sin(this.time * 0.3 + d.speedPhase) * 0.01;
          
          // 基础位置（大范围）
          const baseX = cx + Math.cos(d.angle) * currentRadius;
          const baseY = cy + Math.sin(d.angle) * currentRadius * 0.7;
          
          // 叠加漫游噪声（让运动更自然）
          d.wanderX += (Math.random() - 0.5) * 2;
          d.wanderY += (Math.random() - 0.5) * 2;
          d.wanderX *= 0.95;
          d.wanderY *= 0.95;
          
          // 目标位置
          const targetX = baseX + d.wanderX * 10;
          const targetY = baseY + d.wanderY * 10;
          
          // 平滑移动
          d.x += (targetX - d.x) * 0.03;
          d.y += (targetY - d.y) * 0.03;
        });
        
        // 计算4个IR值（基于有IR的舞者与其他人的距离）
        const irDancers = this.dancers.filter(d => d.hasIR).slice(0, 4);
        return irDancers.map(d => {
          let totalDist = 0, count = 0;
          this.dancers.forEach(other => {
            if (other.id !== d.id) {
              const dx = d.x - other.x, dy = d.y - other.y;
              totalDist += Math.sqrt(dx*dx + dy*dy);
              count++;
            }
          });
          const avgDist = count > 0 ? totalDist / count : 150;
          return Math.min(270, Math.max(0, avgDist * 0.6));
        });
      }
      
      draw(ctx) {
        const connectionRange = params.dancerRange * 0.8;
        // 舞者间连线
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let i = 0; i < this.dancers.length; i++) {
          for (let j = i + 1; j < this.dancers.length; j++) {
            const d1 = this.dancers[i], d2 = this.dancers[j];
            const dx = d1.x - d2.x, dy = d1.y - d2.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < connectionRange) {
              ctx.moveTo(d1.x, d1.y);
              ctx.lineTo(d2.x, d2.y);
            }
          }
        }
        ctx.stroke();
        
        // 绘制舞者点
        this.dancers.forEach(d => {
          const pulse = Math.sin(this.time * 2 + d.id) * 0.1;
          const baseAlpha = d.hasIR ? 0.4 : 0.12;
          const alpha = Math.max(0.05, baseAlpha + pulse);
          const size = d.hasIR ? 8 : 5;
          
          ctx.beginPath();
          ctx.arc(d.x, d.y, size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.fill();
          
          if (d.hasIR) {
            ctx.beginPath();
            ctx.arc(d.x, d.y, size + 6, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.4})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        });
      }
    }
    
    // ═══════════════════════════════════════════════════
    // 视觉引擎
    // ═══════════════════════════════════════════════════
    class VisualEngine {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.dpr = window.devicePixelRatio || 1;
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        this.sensorData = null;
        this.lastDataTime = 0;
        this.touchPoints = new Array(10).fill(false);
        this.time = 0;
        this.displayEnergy = 0;
        
        this.dancerSystem = new DancerSystem();
        this.animate();
      }
      
      resize() {
        this.dpr = window.devicePixelRatio || 1;
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.style.width = this.width + 'px';
        this.canvas.style.height = this.height + 'px';
        this.canvas.width = this.width * this.dpr;
        this.canvas.height = this.height * this.dpr;
        this.ctx.scale(this.dpr, this.dpr);
        this.cx = this.width / 2;
        this.cy = this.height / 2;
      }
      
      updateSensorData(data) {
        this.sensorData = data;
        this.lastDataTime = Date.now();
        if (data.touchPoints) this.touchPoints = data.touchPoints;
      }
      
      animate() {
        requestAnimationFrame(() => this.animate());
        const now = Date.now();
        const hasData = (now - this.lastDataTime) < 400;
        
        // 清屏（使用可调拖尾）
        const trail = params.trailAlpha;
        this.ctx.fillStyle = `rgba(0,0,0,${Math.min(0.5, trail)})`;
        this.ctx.fillRect(0, 0, this.width, this.height);
        
        // 更新舞者数量
        if (this.dancerSystem.dancers.length !== Math.floor(params.dancerCount)) {
          this.dancerSystem.initDancers();
        }
        
        const dancerIR = this.dancerSystem.update(0.016);
        this.dancerSystem.draw(this.ctx);
        
        sensorData.dancerIR = dancerIR;
        const irEl = document.getElementById('dancer-ir');
        if (irEl) irEl.textContent = dancerIR.map(v => Math.round(v)).join(',');
        
        if (!hasData || !this.sensorData) {
          this.ctx.fillStyle = 'rgba(255,255,255,0.15)';
          this.ctx.font = "11px 'Helvetica Neue'";
          this.ctx.textAlign = 'center';
          this.ctx.fillText('等待传感器连接...', this.cx, this.cy + 180);
          return;
        }
        
        this.time += 0.016;
        const targetE = this.sensorData.energy || 0;
        this.displayEnergy += (targetE - this.displayEnergy) * 0.12;
        const normE = this.displayEnergy / 100;
        
        this.drawTopoLine(normE);
      }
      
      drawTopoLine(normE) {
        const mode = parseInt(params.lineMode) || 0;
        const speed = params.lineSpeed;
        const size = params.lineSize;
        const lineW = params.lineThickness + (this.displayEnergy / 2000);
        const alpha = 0.35 + normE * 0.65;
        const glow = params.glowSize;
        
        this.ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        this.ctx.lineWidth = lineW;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        
        if (normE > 0.2 && glow > 0) {
          this.ctx.shadowBlur = normE * glow;
          this.ctx.shadowColor = 'rgba(255,255,255,0.5)';
        } else {
          this.ctx.shadowBlur = 0;
        }
        
        // 根据叙事阶段选择绘制方式
        switch(mode) {
          case 0: this.drawStage0_SineWave(normE, speed, size); break;
          case 1: this.drawStage1_JoyDivision(normE, speed, size); break;
          case 2: this.drawStage2_TopoRing(normE, speed, size); break;
          case 3: this.drawStage3_Lissajous(normE, speed, size); break;
          case 4: this.drawStage4_Galaxy(normE, speed, size); break;
          case 5: this.drawStage5_Heartbeat(normE, speed, size); break;
          default: this.drawStage0_SineWave(normE, speed, size);
        }
        
        // 触碰点脉冲效果
        const activeTouches = this.touchPoints.filter(t => t).length;
        if (activeTouches > 0) {
          this.ctx.strokeStyle = `rgba(255,255,255,${activeTouches * 0.04})`;
          this.ctx.lineWidth = lineW * 2;
          this.ctx.stroke();
        }
        
        this.ctx.shadowBlur = 0;
      }
      
      // 阶段0: 水平正弦波 - 生命的第一声啼哭
      drawStage0_SineWave(normE, speed, size) {
        const t = this.time * speed;
        const baseY = this.cy;
        const width = size * 2;
        
        // 单一线条，轻微正弦波动
        this.ctx.beginPath();
        const points = 200;
        for (let i = 0; i <= points; i++) {
          const x = (i / points - 0.5) * width * 2;
          // 基础正弦 + 能量驱动的振幅
          const freq = 2 + normE * 2;
          const amp = 10 + normE * 40 + (this.displayEnergy * 0.3);
          const y = baseY + Math.sin(x * 0.01 * freq + t) * amp;
          if (i === 0) this.ctx.moveTo(this.cx + x, y);
          else this.ctx.lineTo(this.cx + x, y);
        }
        this.ctx.stroke();
        
        // 能量高时出现细微的纵波（为下一阶段铺垫）
        if (normE > 0.6) {
          this.ctx.strokeStyle = `rgba(255,255,255,${(normE - 0.6) * 0.5})`;
          this.ctx.beginPath();
          for (let i = 0; i <= points; i++) {
            const x = (i / points - 0.5) * width * 2;
            const y = baseY + Math.sin(x * 0.01 * 3 + t + Math.PI/3) * (normE - 0.6) * 30;
            if (i === 0) this.ctx.moveTo(this.cx + x, y);
            else this.ctx.lineTo(this.cx + x, y);
          }
          this.ctx.stroke();
        }
      }
      
      // 阶段1: Joy Division山脉 - 从个体到群体的连接
      drawStage1_JoyDivision(normE, speed, size) {
        const t = this.time * speed;
        const numLines = Math.floor(5 + normE * 25);  // 5-30条线
        const maxWidth = size * 2.5;
        
        for (let layer = 0; layer < numLines; layer++) {
          // 透视：近大远小
          const depth = layer / numLines;  // 0=最近, 1=最远
          const perspective = 1 - depth * 0.7;  // 近处1.0，远处0.3
          const alpha = (1 - depth) * 0.6 + normE * 0.3;
          const lineW = params.lineThickness * perspective * (1 + normE);
          
          this.ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
          this.ctx.lineWidth = lineW;
          
          // 每条线的基线位置（从下到上，模拟深度）
          const baseY = this.cy + 100 - depth * 200;
          
          this.ctx.beginPath();
          const points = 150;
          for (let i = 0; i <= points; i++) {
            const x = (i / points - 0.5) * maxWidth * perspective * 2;
            
            // 山脉轮廓：多层正弦叠加
            const freq1 = 1.5 + layer * 0.1;
            const freq2 = 3 + layer * 0.2;
            const amp1 = 20 * perspective * (1 + normE * 2);
            const amp2 = 10 * perspective * (1 + normE);
            
            // 相位移动创造流动感
            const phase = t * (0.5 + depth * 0.5) + layer * 0.3;
            
            let y = baseY;
            y -= Math.abs(Math.sin(x * 0.008 * freq1 + phase)) * amp1;
            y -= Math.abs(Math.sin(x * 0.015 * freq2 - phase * 0.7)) * amp2 * 0.5;
            
            // 触碰点产生脉冲（只在近处）
            if (depth < 0.3 && this.touchPoints[layer % 10]) {
              y -= Math.sin(t * 10) * 15 * (1 - depth);
            }
            
            if (i === 0) this.ctx.moveTo(this.cx + x, y);
            else this.ctx.lineTo(this.cx + x, y);
          }
          this.ctx.stroke();
        }
        
        // 恢复线条样式
        this.ctx.lineWidth = params.lineThickness;
        this.ctx.strokeStyle = `rgba(255,255,255,${0.35 + normE * 0.65})`;
      }
      
      // 阶段2: 拓扑圆环 - 群体形成闭环
      drawStage2_TopoRing(normE, speed, size) {
        const fov = 400;
        const R = size * 0.7 + normE * 30;
        const t = this.time * speed;
        const gx = this.sensorData?.gx || 0;
        const gy = this.sensorData?.gy || 0;
        
        // 多条"经线"构成圆环
        const numLines = Math.floor(8 + normE * 12);  // 8-20条经线
        
        for (let line = 0; line < numLines; line++) {
          const lineAngle = (line / numLines) * Math.PI * 2;
          
          this.ctx.beginPath();
          const points = 100;
          for (let i = 0; i <= points; i++) {
            // 在圆环表面上的参数
            const ringAngle = (i / points) * Math.PI * 2;
            
            // 圆环的3D坐标
            let rx = R * Math.cos(lineAngle) + (R * 0.3) * Math.cos(ringAngle) * Math.cos(lineAngle);
            let ry = (R * 0.3) * Math.sin(ringAngle);
            let rz = R * Math.sin(lineAngle) + (R * 0.3) * Math.cos(ringAngle) * Math.sin(lineAngle);
            
            // 传感器驱动的变形（像揉面团）
            const deform = normE * 0.3 + (Math.abs(gx) + Math.abs(gy)) * 0.02;
            rx += Math.sin(ringAngle * 3 + t + gx * 0.1) * R * deform * 0.2;
            ry += Math.cos(lineAngle * 2 + t + gy * 0.1) * R * deform * 0.2;
            
            // 3D旋转
            const rX = t * 0.3 + gx * 0.05;
            const rY = t * 0.2 + gy * 0.05;
            
            let nx = rx * Math.cos(rY) - rz * Math.sin(rY);
            let nz = rx * Math.sin(rY) + rz * Math.cos(rY);
            rx = nx; rz = nz;
            
            let ny = ry * Math.cos(rX) - rz * Math.sin(rX);
            nz = ry * Math.sin(rX) + rz * Math.cos(rX);
            ry = ny; rz = nz;
            
            const sc = fov / (fov + rz + 300);
            const px = this.cx + rx * sc;
            const py = this.cy + ry * sc;
            
            if (i === 0) this.ctx.moveTo(px, py);
            else this.ctx.lineTo(px, py);
          }
          this.ctx.stroke();
        }
      }
      
      // 阶段3: 利萨茹扭动 - 连接加深，共振模式
      drawStage3_Lissajous(normE, speed, size) {
        const t = this.time * speed * (1 + normE * 0.5);
        const A = size * (0.7 + normE * 0.3);
        const B = size * (0.5 + normE * 0.2);
        
        // 频率比决定图案形状（随能量变化）
        const freqA = 3 + Math.floor(normE * 4);
        const freqB = 2 + Math.floor(normE * 3);
        const phase = Math.PI / 2 + (this.sensorData?.gx || 0) * 0.03;
        
        // 主曲线
        this.ctx.beginPath();
        const points = 400;
        for (let i = 0; i <= points; i++) {
          const theta = (i / points) * Math.PI * 2;
          const x = A * Math.sin(freqA * theta + t + phase);
          const y = B * Math.sin(freqB * theta + t);
          // 3D深度摆动
          const z = 60 * Math.sin(theta * 3 + t * 1.5);
          const sc = 400 / (400 + z + 200);
          const px = this.cx + x * sc;
          const py = this.cy + y * sc;
          if (i === 0) this.ctx.moveTo(px, py);
          else this.ctx.lineTo(px, py);
        }
        this.ctx.stroke();
        
        // 能量高时：历史轨迹残留（形成编织感）
        if (normE > 0.4) {
          const historyLayers = Math.floor(normE * 5);
          for (let h = 1; h <= historyLayers; h++) {
            const tOffset = h * 0.3;
            this.ctx.strokeStyle = `rgba(255,255,255,${0.1 - h * 0.02})`;
            this.ctx.beginPath();
            for (let i = 0; i <= points; i++) {
              const theta = (i / points) * Math.PI * 2;
              const x = A * 0.9 * Math.sin(freqA * theta + t - tOffset + phase);
              const y = B * 0.9 * Math.sin(freqB * theta + t - tOffset);
              const px = this.cx + x;
              const py = this.cy + y;
              if (i === 0) this.ctx.moveTo(px, py);
              else this.ctx.lineTo(px, py);
            }
            this.ctx.stroke();
          }
        }
      }
      
      // 阶段4: 螺旋银河 - 能量爆发，星云展开
      drawStage4_Galaxy(normE, speed, size) {
        const t = this.time * speed;
        const arms = 3 + Math.floor(normE * 5);  // 3-8条旋臂
        const maxR = size * 0.9;
        
        for (let arm = 0; arm < arms; arm++) {
          this.ctx.beginPath();
          const armOffset = (arm / arms) * Math.PI * 2;
          
          // 每条臂由多层线组成（厚度感）
          const thickness = Math.floor(1 + normE * 3);
          for (let layer = 0; layer < thickness; layer++) {
            const layerOffset = layer * 0.1;
            
            const points = 150;
            for (let i = 0; i < points; i++) {
              const progress = i / points;
              // 阿基米德螺旋：r = a + b*theta
              const theta = progress * Math.PI * 4 + t * (0.4 + arm * 0.1);
              const r = (progress * maxR + layer * 5) * (1 + normE * 0.3);
              
              // 螺旋臂角度 + 波动
              const wobble = Math.sin(theta * 5 + t * 2) * (10 + normE * 20);
              const angle = theta + armOffset + layerOffset;
              
              const x = (r + wobble) * Math.cos(angle);
              const y = (r + wobble) * Math.sin(angle) * 0.7;  // 压扁形成椭圆
              
              const px = this.cx + x;
              const py = this.cy + y;
              
              if (i === 0 && layer === 0) this.ctx.moveTo(px, py);
              else this.ctx.lineTo(px, py);
            }
          }
          this.ctx.stroke();
        }
        
        // 中心核（能量高时明显）
        if (normE > 0.3) {
          this.ctx.fillStyle = `rgba(255,255,255,${normE * 0.5})`;
          this.ctx.beginPath();
          this.ctx.arc(this.cx, this.cy, 5 + normE * 10, 0, Math.PI * 2);
          this.ctx.fill();
        }
      }
      
      // 阶段5: 心电图 - 回归于线
      drawStage5_Heartbeat(normE, speed, size) {
        const t = this.time * speed;
        const baseX = this.cx;
        const height = size * 0.8;
        
        // 呼吸节奏（慢速）
        const breathRate = 0.3;
        const breath = Math.sin(t * breathRate) * 0.5 + 0.5;
        
        // 多条垂直扫描线形成心电图效果
        const numScans = Math.floor(3 + normE * 5);
        
        for (let scan = 0; scan < numScans; scan++) {
          const scanOffset = (scan - numScans/2) * 40;
          
          this.ctx.beginPath();
          const points = 200;
          for (let i = 0; i <= points; i++) {
            const y = (i / points - 0.5) * height * 2;
            
            // 心电图波形：平缓 + 偶尔脉冲
            let x = baseX + scanOffset;
            
            // 基础心跳
            const beatPhase = (t * breathRate + scan * 0.2) % (Math.PI * 2);
            const beat = Math.exp(-Math.pow(beatPhase - Math.PI, 2) * 2) * 30 * breath;
            
            // 传感器驱动的波动
            const sensorWave = Math.sin(y * 0.05 + t + this.sensorData?.gy * 0.1) * (5 + normE * 10);
            
            x += beat + sensorWave;
            
            if (i === 0) this.ctx.moveTo(x, this.cy + y);
            else this.ctx.lineTo(x, this.cy + y);
          }
          this.ctx.stroke();
        }
        
        // 能量极低时：回归直线
        if (normE < 0.2) {
          this.ctx.strokeStyle = `rgba(255,255,255,${1 - normE * 5})`;
          this.ctx.beginPath();
          this.ctx.moveTo(baseX - size, this.cy);
          this.ctx.lineTo(baseX + size, this.cy);
          this.ctx.stroke();
        }
      }
    }
    
    window.visualEngine = new VisualEngine('visual-canvas');
  </script>
</body>
