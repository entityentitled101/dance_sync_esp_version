<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>声·命体 —— 原型 v1 (Topological)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    #visual-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    #control-panel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 10, 0.95);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 340px;
    }
    
    .panel-header {
      font-size: 10px;
      letter-spacing: 3px;
      color: #666;
      text-transform: uppercase;
      text-align: center;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
    }
    
    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    
    .touch-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #333;
      background: transparent;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: #444;
    }
    
    .touch-dot.active {
      background: #fff;
      border-color: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
      color: #000;
    }
    
    .energy-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      color: #666;
    }
    
    .energy-track {
      flex: 1;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    
    .energy-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.05s;
    }
    
    .connection-row {
      display: flex;
      gap: 8px;
    }
    
    .conn-btn {
      flex: 1;
      padding: 8px 12px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid #444;
      background: transparent;
      color: #666;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .conn-btn:hover {
      border-color: #888;
      color: #aaa;
    }
    
    .conn-btn.connected {
      border-color: #fff;
      color: #fff;
      background: rgba(255,255,255,0.1);
    }
    
    .conn-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .toggle-row {
      display: flex;
      gap: 8px;
      font-size: 9px;
    }
    
    .toggle-btn {
      flex: 1;
      padding: 6px;
      border: 1px solid #333;
      background: transparent;
      color: #555;
      cursor: pointer;
      border-radius: 4px;
      font-size: 9px;
      letter-spacing: 1px;
    }
    
    .toggle-btn.active {
      border-color: #fff;
      color: #fff;
      background: rgba(255,255,255,0.1);
    }
    
    .value-display {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #444;
      font-family: 'Menlo', monospace;
    }
    
    #audio-btn {
      width: 100%;
      padding: 10px;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: 1px solid #444;
      background: transparent;
      color: #666;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    #audio-btn:hover {
      border-color: #888;
      color: #aaa;
    }
    
    #audio-btn.ready {
      border-color: #fff;
      color: #fff;
    }
  </style>
</head>
<body>
  <canvas id="visual-canvas"></canvas>
  
  <div id="control-panel">
    <div class="panel-header">声·命体 —— 拓扑线条原型</div>
    
    <button id="audio-btn" onclick="initAudio()">🔊 启动音频引擎</button>
    
    <div class="energy-bar">
      <span>ENERGY</span>
      <div class="energy-track">
        <div class="energy-fill" id="energy-fill"></div>
      </div>
      <span id="energy-value">0</span>
    </div>
    
    <div class="sensor-grid" id="touch-grid">
      <!-- 10个触碰点 -->
      <div class="touch-dot" id="touch-0">0</div>
      <div class="touch-dot" id="touch-1">1</div>
      <div class="touch-dot" id="touch-2">2</div>
      <div class="touch-dot" id="touch-3">3</div>
      <div class="touch-dot" id="touch-4">4</div>
      <div class="touch-dot" id="touch-5">5</div>
      <div class="touch-dot" id="touch-6">6</div>
      <div class="touch-dot" id="touch-7">7</div>
      <div class="touch-dot" id="touch-8">8</div>
      <div class="touch-dot" id="touch-9">9</div>
    </div>
    
    <div class="toggle-row">
      <button class="toggle-btn active" id="auto-touch" onclick="toggleAutoTouch()">自动触碰</button>
      <button class="toggle-btn" id="manual-mode" onclick="toggleManualMode()">手动模式</button>
    </div>
    
    <div class="connection-row">
      <button class="conn-btn" id="ble-0" onclick="startBLE(0)">🔵 球形装置</button>
      <button class="conn-btn" id="ble-1" onclick="startBLE(1)">🔵 舞者传感器</button>
    </div>
    
    <div class="value-display">
      <span>球红外: <span id="sphere-ir">135,135,135</span></span>
      <span>舞者: <span id="dancer-ir">135,135,135,135</span></span>
    </div>
    
    <div class="sens-row" style="display:flex;gap:8px;align-items:center;font-size:9px;color:#666;">
      <span>灵敏度:</span>
      <input type="range" id="main-sens" min="0.1" max="3" step="0.1" value="1" style="flex:1;" oninput="updateSens(0, this.value)">
      <span id="sens-lbl">1.0</span>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // 常量与配置
    // ═══════════════════════════════════════════════════
    const SERVICE_UUID = '19b10000-e8f2-537e-4f6c-d104768a1214';
    const CHAR_UUID = '03504231-c554-43a4-b711-0b2945565834';
    const DEVICE_NAMES = ['ESP32', 'ESP32-mini'];
    
    // ═══════════════════════════════════════════════════
    // 状态
    // ═══════════════════════════════════════════════════
    const ctrl = [
      { bleDevice: null, bleChar: null, connected: false, role: 'sphere', vBuf: [] },
      { bleDevice: null, bleChar: null, connected: false, role: 'dancer', vBuf: [] },
    ];
    
    let audioReady = false;
    let isAutoTouch = true;
    let isManualMode = false;
    
    // 模拟的传感器数据
    let sensorData = {
      touchPoints: new Array(10).fill(false),
      sphereIR: [135, 135, 135],
      dancerIR: [135, 135, 135, 135],
      totalEnergy: 0,
      momentum: 0
    };
    
    // 音频节点
    let masterGain, limiter, reverb;
    let droneSynth, noiseSynth;
    let droneGain, noiseGain;
    
    // ═══════════════════════════════════════════════════
    // 音频初始化
    // ═══════════════════════════════════════════════════
    async function initAudio() {
      if (audioReady) return;
      try {
        await Tone.start();
        
        limiter = new Tone.Limiter(-2).toDestination();
        masterGain = new Tone.Gain(0.8).connect(limiter);
        reverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).connect(masterGain);
        
        droneGain = new Tone.Gain(0).connect(reverb);
        droneSynth = new Tone.FatOscillator({
          type: 'sawtooth',
          frequency: 55,
          spread: 30,
          count: 3
        }).start().connect(droneGain);
        
        noiseGain = new Tone.Gain(0).connect(masterGain);
        noiseSynth = new Tone.Noise('pink').start();
        const noiseFilter = new Tone.Filter(800, 'lowpass');
        noiseSynth.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        
        audioReady = true;
        document.getElementById('audio-btn').textContent = '🔊 音频就绪';
        document.getElementById('audio-btn').classList.add('ready');
        
      } catch (e) {
        console.error('音频初始化失败:', e);
      }
    }
    
    // 灵敏度设置
    let mainSens = 1.0, fxSens = 0.5;
    
    // ═══════════════════════════════════════════════════
    // 传感器数据处理
    // ═══════════════════════════════════════════════════
    let lastSensorTime = 0;
    function processSensorData(idx, data) {
      lastSensorTime = Date.now();
      const { ax, ay, az, gx, gy, gz } = data;
      
      // 应用灵敏度
      const sens = idx === 0 ? mainSens : fxSens;
      const sax = ax * sens, say = ay * sens, saz = az * sens;
      const sgx = gx * sens, sgy = gy * sens, sgz = gz * sens;
      
      const accMagnitude = Math.sqrt(sax*sax + say*say + saz*saz);
      const gyroMagnitude = Math.sqrt(sgx*sgx + sgy*sgy + sgz*sgz);
      
      const c = ctrl[idx];
      c.vBuf.push(accMagnitude);
      if (c.vBuf.length > 20) c.vBuf.shift();
      const smoothedEnergy = c.vBuf.reduce((a,b) => a+b, 0) / c.vBuf.length;
      
      if (idx === 0) {
        // 球形装置：3个红外值用六轴映射
        sensorData.sphereIR[0] = Math.min(270, Math.max(0, 135 + sgx * 15)); // 顶部
        sensorData.sphereIR[1] = Math.min(270, Math.max(0, sgy * 20 + 135)); // 侧边
        sensorData.sphereIR[2] = Math.min(270, Math.max(0, 135 - saz * 10)); // 底面（加速度）
        
        // 自动触碰点：基于能量自动生成（模拟手盘球）
        const baseActivity = Math.min(1, smoothedEnergy / 10);
        for (let i = 0; i < 10; i++) {
          // 能量高时更多点亮起，模拟手在球上乱摸
          const threshold = 0.9 - (baseActivity * 0.5);
          // 加上时间波动，让触碰有连续性
          const timeFactor = Math.sin(Date.now() / 200 + i) * 0.2;
          sensorData.touchPoints[i] = Math.random() > (threshold + timeFactor);
        }
      }
      // 舞者红外值由背景动画自动处理
      
      const instantEnergy = Math.min(100, (accMagnitude + gyroMagnitude * 0.5) * 5);
      sensorData.totalEnergy = sensorData.totalEnergy * 0.8 + instantEnergy * 0.2;
      
      updateUI();
      
      // 音频
      if (audioReady) {
        const normEnergy = sensorData.totalEnergy / 100;
        droneGain.gain.rampTo(normEnergy * 0.5, 0.1);
        noiseGain.gain.rampTo(normEnergy * normEnergy * 0.3, 0.1);
        droneSynth.frequency.rampTo(55 + normEnergy * 100, 0.1);
      }
      
      // 传递六轴数据给视觉引擎
      if (window.visualEngine) {
        window.visualEngine.updateSensorData({
          ax: sax, ay: say, az: saz, gx: sgx, gy: sgy, gz: sgz,
          energy: sensorData.totalEnergy,
          touchPoints: sensorData.touchPoints,
          sphereIR: sensorData.sphereIR
        });
      }
    }
    
    function updateUI() {
      document.getElementById('energy-fill').style.width = sensorData.totalEnergy + '%';
      document.getElementById('energy-value').textContent = Math.round(sensorData.totalEnergy);
      
      for (let i = 0; i < 10; i++) {
        const el = document.getElementById('touch-' + i);
        if (el) el.classList.toggle('active', sensorData.touchPoints[i]);
      }
      
      document.getElementById('sphere-ir').textContent = sensorData.sphereIR.map(v => Math.round(v)).join(',');
      // 舞者IR由视觉引擎更新
    }
    
    // ═══════════════════════════════════════════════════
    // BLE连接（参考VerD实现）
    // ═══════════════════════════════════════════════════
    async function startBLE(idx) {
      if (!navigator.bluetooth) { alert('需要 Chrome/Edge 浏览器'); return; }
      if (!audioReady) await initAudio();
      
      const btn = document.getElementById('ble-' + idx);
      const c = ctrl[idx];
      
      btn.textContent = '🔵 扫描中...';
      btn.disabled = true;
      
      try {
        c.bleDevice = await navigator.bluetooth.requestDevice({ 
          filters: [{ name: DEVICE_NAMES[idx] }], 
          optionalServices: [SERVICE_UUID] 
        });
        
        c.bleDevice.addEventListener('gattserverdisconnected', () => {
          c.connected = false; 
          btn.textContent = idx === 0 ? '🔵 球形装置' : '🔵 舞者传感器';
          btn.classList.remove('connected');
          btn.disabled = false;
        });
        
        const server = await c.bleDevice.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        c.bleChar = await service.getCharacteristic(CHAR_UUID);
        await c.bleChar.startNotifications();
        
        c.bleChar.addEventListener('characteristicvaluechanged', (e) => {
          try { 
            onSensorData(idx, JSON.parse(new TextDecoder().decode(e.target.value))); 
          } catch (_) {}
        });
        
        c.connected = true;
        btn.textContent = '🔵 已连接';
        btn.classList.add('connected');
        btn.disabled = false;
        
      } catch (e) {
        btn.textContent = idx === 0 ? '🔵 球形装置' : '🔵 舞者传感器';
        btn.disabled = false;
        console.error(e);
      }
    }
    
    function onSensorData(idx, json) {
      const { ax, ay, az, gx, gy, gz } = parseSensor(json);
      processSensorData(idx, { ax, ay, az, gx, gy, gz });
    }
    
    function parseSensor(json) {
      let ax, ay, az, gx, gy, gz;
      if (json.ax !== undefined) {
        ax = +json.ax || 0; ay = +json.ay || 0; az = +json.az || 0;
        gx = +json.gx || 0; gy = +json.gy || 0; gz = +json.gz || 0;
      } else {
        const a = json.acceleration || {};
        const g = json.gyro || {};
        ax = +a.x || 0; ay = +a.y || 0; az = +a.z || 0;
        gx = +g.x || 0; gy = +g.y || 0; gz = +g.z || 0;
      }
      return { ax, ay, az, gx, gy, gz };
    }
    
    // ═══════════════════════════════════════════════════
    // 模式切换
    // ═══════════════════════════════════════════════════
    function toggleAutoTouch() {
      isAutoTouch = !isAutoTouch;
      document.getElementById('auto-touch').classList.toggle('active', isAutoTouch);
    }
    
    function toggleManualMode() {
      isManualMode = !isManualMode;
      document.getElementById('manual-mode').classList.toggle('active', isManualMode);
    }
    
    function updateSens(idx, val) {
      if (idx === 0) mainSens = parseFloat(val);
      else fxSens = parseFloat(val);
      document.getElementById('sens-lbl').textContent = parseFloat(val).toFixed(1);
    }
    
    // ═══════════════════════════════════════════════════
    // 舞者动画系统（背景8个点，4个有红外）
    // ═══════════════════════════════════════════════════
    class DancerSystem {
      constructor() {
        this.dancers = [];
        this.time = 0;
        // 8个舞者，其中4个有红外传感器（索引 0,2,4,6）
        for (let i = 0; i < 8; i++) {
          this.dancers.push({
            id: i,
            hasIR: (i % 2 === 0), // 0,2,4,6 有红外
            x: 0, y: 0,
            vx: 0, vy: 0,
            baseAngle: (i / 8) * Math.PI * 2,
            orbitRadius: 100 + Math.random() * 50,
            speed: 0.3 + Math.random() * 0.4,
            phase: Math.random() * Math.PI * 2
          });
        }
      }
      
      update(dt) {
        this.time += dt;
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        
        this.dancers.forEach(d => {
          // 编排舞蹈：基础圆周运动 + 正弦波动 + 相互吸引
          const angle = d.baseAngle + this.time * d.speed * 0.5;
          const orbitX = centerX + Math.cos(angle) * d.orbitRadius;
          const orbitY = centerY + Math.sin(angle) * d.orbitRadius * 0.6;
          
          // 添加波动
          const wave = Math.sin(this.time * 2 + d.phase) * 30;
          const targetX = orbitX + Math.cos(d.phase + this.time) * wave;
          const targetY = orbitY + Math.sin(d.phase + this.time * 1.3) * wave;
          
          // 平滑移动
          d.x += (targetX - d.x) * 0.05;
          d.y += (targetY - d.y) * 0.05;
        });
        
        // 计算4个红外值（基于有红外传感器的舞者之间的距离）
        const irDancers = this.dancers.filter(d => d.hasIR);
        const irValues = [];
        
        irDancers.forEach(d => {
          // 计算这个舞者到其他舞者的平均距离
          let totalDist = 0;
          let count = 0;
          this.dancers.forEach(other => {
            if (other.id !== d.id) {
              const dx = d.x - other.x;
              const dy = d.y - other.y;
              totalDist += Math.sqrt(dx*dx + dy*dy);
              count++;
            }
          });
          const avgDist = count > 0 ? totalDist / count : 100;
          // 映射到 0-270：距离越近值越小（手越靠近装置）
          const irValue = Math.min(270, Math.max(0, avgDist * 0.5));
          irValues.push(irValue);
        });
        
        return irValues; // 返回4个红外值
      }
      
      draw(ctx) {
        this.dancers.forEach(d => {
          // 有红外的舞者透明度稍高（0.3-0.5），没有的更低（0.1-0.2）
          const baseAlpha = d.hasIR ? 0.35 : 0.12;
          const pulse = Math.sin(this.time * 3 + d.phase) * 0.1;
          const alpha = baseAlpha + pulse;
          const size = d.hasIR ? 6 : 4;
          
          ctx.beginPath();
          ctx.arc(d.x, d.y, size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
          ctx.fill();
          
          // 有红外的舞者画一个微弱的圈标记
          if (d.hasIR) {
            ctx.beginPath();
            ctx.arc(d.x, d.y, size + 4, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.5})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        });
        
        // 绘制舞者之间的连线（形成舞蹈编队的视觉）
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let i = 0; i < this.dancers.length; i++) {
          for (let j = i + 1; j < this.dancers.length; j++) {
            const d1 = this.dancers[i];
            const d2 = this.dancers[j];
            const dx = d1.x - d2.x;
            const dy = d1.y - d2.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 200) {
              ctx.moveTo(d1.x, d1.y);
              ctx.lineTo(d2.x, d2.y);
            }
          }
        }
        ctx.stroke();
      }
    }
    
    // ═══════════════════════════════════════════════════
    // 视觉引擎 —— Topological Wireframe + 舞者背景
    // ═══════════════════════════════════════════════════
    class VisualEngine {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.dpr = window.devicePixelRatio || 1;
        this.resize();
        window.addEventListener('resize', () => this.resize());
        
        // 传感器数据
        this.sensorData = null;
        this.lastDataTime = 0;
        this.touchPoints = new Array(10).fill(false);
        this.sphereIR = [135, 135, 135];
        
        // 动画参数
        this.time = 0;
        this.displayEnergy = 0;
        
        // 舞者系统
        this.dancerSystem = new DancerSystem();
        
        this.animate();
      }
      
      resize() {
        this.dpr = window.devicePixelRatio || 1;
        this.width = window.innerWidth;
        this.height = window.innerHeight;
        this.canvas.style.width = this.width + 'px';
        this.canvas.style.height = this.height + 'px';
        this.canvas.width = this.width * this.dpr;
        this.canvas.height = this.height * this.dpr;
        this.ctx.scale(this.dpr, this.dpr);
        this.cx = this.width / 2;
        this.cy = this.height / 2;
      }
      
      updateSensorData(data) {
        this.sensorData = data;
        this.lastDataTime = Date.now();
        if (data.touchPoints) this.touchPoints = data.touchPoints;
        if (data.sphereIR) this.sphereIR = data.sphereIR;
      }
      
      animate() {
        requestAnimationFrame(() => this.animate());
        
        const now = Date.now();
        const hasSensorData = (now - this.lastDataTime) < 500; // 500ms内收到过数据才算连接
        
        // 清屏
        this.ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        this.ctx.fillRect(0, 0, this.width, this.height);
        
        // 更新舞者系统（始终在背景运行）
        const dancerIR = this.dancerSystem.update(0.016);
        this.dancerSystem.draw(this.ctx);
        
        // 更新舞者IR显示
        sensorData.dancerIR = dancerIR;
        const dancerIREl = document.getElementById('dancer-ir');
        if (dancerIREl) dancerIREl.textContent = dancerIR.map(v => Math.round(v)).join(',');
        
        // 如果没有传感器数据，只显示背景舞者，不显示线条
        if (!hasSensorData || !this.sensorData) {
          // 显示提示文字
          this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
          this.ctx.font = "12px 'Helvetica Neue'";
          this.ctx.textAlign = 'center';
          this.ctx.fillText('等待传感器连接...', this.cx, this.cy + 150);
          return;
        }
        
        this.time += 0.016;
        
        // 能量平滑
        const targetEnergy = this.sensorData.energy || 0;
        this.displayEnergy += (targetEnergy - this.displayEnergy) * 0.1;
        const normEnergy = this.displayEnergy / 100;
        
        // 绘制拓扑线条（基于 drawTopo 算法）
        this.drawTopoLine(normEnergy);
      }
      
      drawTopoLine(normEnergy) {
        const fov = 400;
        const baseR = Math.min(this.width, this.height) * 0.22;
        const R = baseR + normEnergy * 80;
        const dist = this.displayEnergy / 60;
        
        // 使用六轴陀螺仪数据影响旋转（如果有）
        const gx = this.sensorData?.gx || 0;
        const gy = this.sensorData?.gy || 0;
        const gz = this.sensorData?.gz || 0;
        
        // 变形参数：能量 + 陀螺仪
        const m1 = Math.sin(this.time * (0.4 + normEnergy * 0.5) + gx * 0.1) * (3 + normEnergy * 5);
        const m2 = Math.cos(this.time * 0.25 + gy * 0.1) * (2 + normEnergy * 3);
        
        const lineWidth = 0.8 + (this.displayEnergy / 1000) + normEnergy * 2;
        const alpha = 0.4 + normEnergy * 0.6;
        
        this.ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        this.ctx.lineWidth = lineWidth;
        this.ctx.lineCap = 'round';
        this.ctx.lineJoin = 'round';
        
        if (normEnergy > 0.3) {
          this.ctx.shadowBlur = normEnergy * 25;
          this.ctx.shadowColor = 'rgba(255, 255, 255, 0.6)';
        } else {
          this.ctx.shadowBlur = 0;
        }
        
        // 拓扑线条
        this.ctx.beginPath();
        const numPoints = 250;
        for (let i = 0; i < numPoints; i++) {
          const t = (i / numPoints) * Math.PI * 2 * (3 + m1);
          
          let rx = R * Math.cos(t) * (1 + 0.3 * Math.cos(t * m2));
          let ry = R * Math.sin(t) * (1 + 0.3 * Math.cos(t * m2));
          let rz = R * 0.4 * Math.sin(t * m1);
          
          // 噪声 + 陀螺仪影响
          const noiseAmp = 1 + normEnergy * 5;
          const nX = Math.sin(t * 12 + this.time * 4 + gz * 0.2) * dist * 6 * noiseAmp;
          const nY = Math.cos(t * 10 - this.time * 2.5) * dist * 6 * noiseAmp;
          const nZ = Math.sin(t * 15 + this.time * 3.5) * dist * 6 * noiseAmp;
          
          rx += nX; ry += nY; rz += nZ;
          
          // 旋转
          const rX = this.time * (0.3 + normEnergy * 0.3) + gx * 0.05;
          const rY = this.time * (0.45 + normEnergy * 0.2) + gy * 0.05;
          
          let nx = rx * Math.cos(rY) - rz * Math.sin(rY);
          let nz = rx * Math.sin(rY) + rz * Math.cos(rY);
          rx = nx; rz = nz;
          
          let ny = ry * Math.cos(rX) - rz * Math.sin(rX);
          nz = ry * Math.sin(rX) + rz * Math.cos(rX);
          ry = ny; rz = nz;
          
          const scale = fov / (fov + rz + 300);
          const px = this.cx + rx * scale;
          const py = this.cy + ry * scale;
          
          if (i === 0) this.ctx.moveTo(px, py);
          else this.ctx.lineTo(px, py);
        }
        
        this.ctx.closePath();
        this.ctx.stroke();
        
        // 触碰点脉冲效果
        const activeTouches = this.touchPoints.filter(t => t).length;
        if (activeTouches > 0) {
          this.ctx.strokeStyle = `rgba(255, 255, 255, ${activeTouches * 0.05})`;
          this.ctx.lineWidth = lineWidth * 2.5;
          this.ctx.stroke();
        }
        
        this.ctx.shadowBlur = 0;
      }
    }
    
    // 启动视觉引擎
    window.visualEngine = new VisualEngine('visual-canvas');
  </script>
</body>
</html>
